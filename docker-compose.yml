# ============================================================
# POSLA — ローカル開発専用 Docker Compose
# ============================================================
# 用途: スモークテスト指摘 High #4 解消（ローカルで本番相当の API を再現）
# 本番 (Sakura) には一切影響しない。ローカル DB は別ホスト・別 DB。
#
# 起動:    docker compose up -d
# 停止:    docker compose down
# 完全リセット: docker compose down -v && docker compose up -d
# ============================================================

services:
  db:
    image: mysql:5.7
    platform: linux/amd64   # macOS Apple Silicon 対策（mysql:5.7 は arm64 ネイティブなし）
    container_name: posla_db
    restart: unless-stopped
    env_file:
      - ./docker/env/db.env
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
      - --default-authentication-plugin=mysql_native_password
      - --sql-mode=NO_ENGINE_SUBSTITUTION
      - --skip-name-resolve
    ports:
      - "3306:3306"
    volumes:
      - posla_db_data:/var/lib/mysql
      # /docker-entrypoint-initdb.d/ 内の *.sql / *.sh は初回起動時に辞書順で自動実行される
      - ./docker/db/init:/docker-entrypoint-initdb.d:ro
      # 01-schema.sh が schema.sql + migration-*.sql を辞書順で流すための参照元
      - ./sql:/sql_src:ro
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-prootpass"]
      interval: 5s
      timeout: 5s
      retries: 30

  redis:
    image: redis:7-alpine
    container_name: posla_redis
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - posla_redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 30

  php:
    build:
      context: ./docker/php
      dockerfile: Dockerfile
      platforms:
        - linux/amd64
    platform: linux/amd64
    container_name: posla_php
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    env_file:
      - ./docker/env/app.env
    ports:
      - "8081:80"
    volumes:
      # アプリ本体（ホスト側で編集 → 即反映）
      - ./api:/var/www/html/api
      - ./public:/var/www/html/public
      - ./scripts:/var/www/html/scripts
      - ./sql:/var/www/html/sql:ro
      - ./uploads:/var/www/html/uploads
      - ./privacy:/var/www/html/privacy:ro
      - ./terms:/var/www/html/terms:ro
      - ./docker/php/apache-vhost.conf:/etc/apache2/sites-available/000-default.conf:ro

volumes:
  posla_db_data:
    driver: local
  posla_redis_data:
    driver: local
