<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#1a237e">
  <title>ハンディPOS</title>
  <link rel="stylesheet" href="css/handy.css?v=20260429-handy-ops4">
  <!-- PWA -->
  <link rel="manifest" href="manifest.webmanifest">
  <link rel="apple-touch-icon" href="icons/apple-touch-icon.png">
</head>
<body>

  <!-- ヘッダー -->
  <header class="handy-header">
    <div class="handy-header__left">
      <span class="handy-header__title">ハンディ</span>
      <span class="handy-header__store-name" id="handy-store-name">-</span>
    </div>
    <div class="handy-header__right">
      <a href="#" class="handy-header__link" id="handy-change-store" style="display:none">店舗切替</a>
      <div id="handy-terminal-mode" class="handy-terminal-mode" aria-label="端末モード"></div>
      <button id="handy-pending-btn" class="handy-header__pending" type="button" style="display:none">未送信 <span id="handy-pending-count">0</span></button>
      <span id="handy-user-name" class="handy-header__user">-</span>
      <button id="btn-logout" class="handy-header__logout">ログアウト</button>
    </div>
  </header>

  <!-- タブナビ -->
  <nav class="handy-tabs">
    <button class="handy-tabs__btn active" data-tab="dinein">店内注文</button>
    <button class="handy-tabs__btn" data-tab="takeout">テイクアウト</button>
    <button class="handy-tabs__btn" data-tab="tables">テーブル状況</button>
    <button class="handy-tabs__btn" data-tab="ops">運用</button>
    <button class="handy-tabs__btn" data-tab="reservations">📅 予約</button>
    <button class="handy-tabs__btn" data-tab="history">注文履歴</button>
  </nav>

  <!-- 編集中バナー -->
  <div id="edit-banner" class="edit-banner">
    <span>修正中</span>
    <button id="btn-cancel-edit">キャンセル</button>
  </div>

  <!-- 注文パネル（店内 & テイクアウト共用） -->
  <div id="panel-order" class="handy-panel">
    <!-- 店内: テーブル選択 -->
    <div id="ctx-dinein" class="order-context">
      <label>テーブル</label>
      <select id="table-select" class="ctx-select">
        <option value="">テーブルを選択</option>
      </select>
      <div id="selected-table-panel" class="table-action-panel" style="display:none"></div>
    </div>

    <!-- テイクアウト: 顧客情報 -->
    <div id="ctx-takeout" class="order-context" style="display:none">
      <div class="ctx-row">
        <input type="text" id="to-name" class="ctx-input" placeholder="顧客名">
        <input type="tel" id="to-phone" class="ctx-input" placeholder="電話番号">
      </div>
      <div class="ctx-row">
        <label>受取時間</label>
        <input type="datetime-local" id="to-pickup" class="ctx-input">
      </div>
    </div>

    <!-- カテゴリタブ -->
    <div id="quick-order-panel" class="quick-order-panel" style="display:none"></div>
    <div id="category-tabs" class="cat-tabs"></div>

    <!-- メニューグリッド -->
    <div id="menu-grid" class="menu-grid"></div>
  </div>

  <!-- テーブル状況パネル -->
  <div id="panel-tables" class="handy-panel" style="display:none">
    <div id="table-status-info" class="table-status__info"></div>
    <div id="table-status-grid" class="table-status__grid"></div>
  </div>

  <!-- 運用パネル -->
  <div id="panel-ops" class="handy-panel handy-ops-panel" style="display:none">
    <div class="ops-board__header">
      <div>
        <div class="ops-board__title">運用ボード</div>
        <div class="ops-board__sub">未対応だけを上から処理します</div>
      </div>
      <button id="ops-refresh" class="ops-board__refresh" type="button">更新</button>
    </div>
    <div id="ops-summary" class="ops-summary"></div>
    <div id="ops-alerts" class="ops-alerts"></div>
    <div id="ops-tasks" class="ops-tasks"></div>
    <div id="ops-log" class="ops-log"></div>
    <div class="ops-board__section-title">卓クイック操作</div>
    <div id="ops-table-grid" class="ops-table-grid"></div>
  </div>

  <!-- 予約パネル (L-9) -->
  <div id="panel-reservations" class="handy-panel" style="display:none">
    <div style="padding:8px 12px;display:flex;gap:6px;align-items:center;background:#fafafa;border-bottom:1px solid #ddd;">
      <button id="rsv-prev-day" style="padding:4px 10px;border:1px solid #ccc;background:#fff;border-radius:4px;">‹</button>
      <input type="date" id="rsv-date" style="padding:4px 6px;border:1px solid #ccc;border-radius:4px;flex:1;max-width:160px;">
      <button id="rsv-next-day" style="padding:4px 10px;border:1px solid #ccc;background:#fff;border-radius:4px;">›</button>
      <button id="rsv-today" style="padding:4px 10px;border:1px solid #ccc;background:#fff;border-radius:4px;">今日</button>
      <span id="rsv-summary" style="margin-left:auto;font-size:0.85rem;color:#666;"></span>
    </div>
    <div class="handy-rsv-toolbar">
      <div class="handy-rsv-toolbar__copy">先に既存予約を確認し、時間と人数を入れると空席可否を即確認できます</div>
    </div>
    <div class="handy-rsv-check">
      <div class="handy-rsv-check__row">
        <input type="time" id="rsv-check-time" class="handy-rsv-create__input handy-rsv-create__input--time">
        <input type="number" id="rsv-check-party" class="handy-rsv-create__input handy-rsv-create__input--party" min="1" max="20" step="1" value="2" placeholder="人数">
        <button id="rsv-toggle-create" class="handy-rsv-toolbar__btn">電話予約を追加</button>
      </div>
      <div id="rsv-availability" class="handy-rsv-check__status">日付・時間・人数を指定すると空席状況を表示します</div>
    </div>
    <div id="rsv-list" style="padding:12px;"></div>
    <div id="rsv-create-panel" class="handy-rsv-create" style="display:none;">
      <div class="handy-rsv-create__title">電話予約を追加</div>
      <div class="handy-rsv-create__hint">日付は上のカレンダーに従います</div>
      <div class="handy-rsv-create__row">
        <input type="text" id="rsv-new-name" class="handy-rsv-create__input" placeholder="お客様名">
        <input type="tel" id="rsv-new-phone" class="handy-rsv-create__input" placeholder="電話番号">
      </div>
      <div class="handy-rsv-create__row">
        <input type="time" id="rsv-new-time" class="handy-rsv-create__input handy-rsv-create__input--time">
        <input type="number" id="rsv-new-party" class="handy-rsv-create__input handy-rsv-create__input--party" min="1" max="20" step="1" value="2" placeholder="人数">
        <select id="rsv-new-table" class="handy-rsv-create__input handy-rsv-create__input--table">
          <option value="">テーブル未割当</option>
        </select>
      </div>
      <textarea id="rsv-new-memo" class="handy-rsv-create__textarea" rows="2" maxlength="255" placeholder="メモ（任意）"></textarea>
      <button id="rsv-create-btn" class="handy-rsv-create__btn">この日付で予約登録</button>
    </div>
  </div>

  <!-- 注文履歴パネル -->
  <div id="panel-history" class="handy-panel" style="display:none">
    <div id="order-list" class="order-list"></div>
  </div>

  <!-- カートバー（固定フッター） -->
  <div id="cart-bar" class="cart-bar">
    <div class="cart-bar__summary" id="cart-summary">
      <span class="cart-bar__badge" id="cart-badge">カート (0品)</span>
      <span class="cart-bar__total" id="cart-total">¥0</span>
      <button id="btn-submit" class="cart-bar__submit" disabled>注文送信</button>
    </div>
    <div class="cart-bar__detail" id="cart-detail" style="display:none">
      <div id="cart-items"></div>
      <div class="handy-memo-row" style="padding:8px 12px">
        <input type="text" id="handy-order-memo" placeholder="メモ（ネギ抜き等）" maxlength="200" style="width:100%;padding:6px 10px;border:1px solid #444;border-radius:6px;background:#1a1a2e;color:#fff;font-size:0.85rem;box-sizing:border-box">
      </div>
      <div class="cart-bar__footer">
        <button id="btn-clear-cart" class="btn-clear">クリア</button>
        <span class="cart-bar__footer-total">合計: ¥0</span>
        <button id="btn-submit2" class="cart-bar__submit" disabled>注文送信</button>
      </div>
    </div>
  </div>

  <!-- オプション選択モーダル -->
  <div id="option-overlay" class="opt-overlay">
    <div class="opt-modal">
      <div class="opt-modal__header">
        <span id="option-modal-title" class="opt-modal__title"></span>
        <button id="option-modal-cancel" class="opt-modal__close">&times;</button>
      </div>
      <div id="option-modal-body" class="opt-modal__body"></div>
      <div class="opt-modal__footer">
        <span id="option-modal-price" class="opt-modal__price">¥0</span>
        <button id="option-modal-add" class="opt-modal__add">カートに追加</button>
      </div>
    </div>
  </div>

  <!-- 店舗選択オーバーレイ -->
  <div class="handy-store-overlay" id="handy-store-overlay" style="display:none">
    <div class="handy-store-overlay__box">
      <div class="handy-store-overlay__title">店舗を選択してください</div>
      <div class="handy-store-overlay__list" id="handy-store-list"></div>
    </div>
  </div>

  <!-- トースト -->
  <div id="toast" class="handy-toast"></div>

  <script src="../shared/js/utils.js?v=20260419-phaseB"></script>
  <script src="../shared/js/revision-gate.js?v=20260420-rev2"></script>
  <script src="js/handy-app.js?v=20260429-handy-ops4"></script>
  <script>
  (function () {
    'use strict';
    HandyApp.init();
  })();
  </script>
  <script src="js/handy-alert.js?v=20260420-pwa3"></script>
  <script src="../js/theme-switcher.js"></script>
  <script>ThemeSwitcher.injectButton(document.querySelector('.handy-header__right'));</script>
  <script src="../js/offline-detector.js"></script>
  <!-- Phase 3: オフライン時の表示耐性 (snapshot + 古いデータ表示バナー) -->
  <script src="../shared/js/offline-snapshot.js?v=20260420-pwa3"></script>
  <script src="../shared/js/offline-state-banner.js?v=20260420-pwa3"></script>
  <script>
    (function () {
      'use strict';
      if (typeof OfflineStateBanner === 'undefined') return;
      OfflineStateBanner.init({
        scope: 'handy',
        onRetry: function () {
          // 軽量リトライ: HandyApp が保持する最新 _storeId で再 fetch
          try { location.reload(); } catch (e) {}
        }
      });
    })();
  </script>
  <script src="../js/session-monitor.js?v=20260419-fixurl"></script>
  <script src="pwa-register.js"></script>
  <script src="../shared/js/install-prompt-banner.js?v=20260429-business-install1"></script>
  <script>
    (function () {
      'use strict';
      if (typeof InstallPromptBanner === 'undefined') return;
      InstallPromptBanner.init('handy', {
        androidOnly: true,
        iosHint: false,
        manualAndroidHint: true,
        background: '#ef6c00',
        primaryColor: '#ef6c00',
        padding: '12px 14px',
        fontSize: '14px',
        buttonPadding: '8px 14px',
        buttonFontSize: '13px',
        message: 'POSLAハンディをホーム画面に追加すると、注文入力を1タップで起動できます。',
        manualMessage: 'Chrome右上のメニューから「ホーム画面に追加」を選ぶと、ハンディを1タップで起動できます。',
        installText: 'ホームに追加'
      });
    })();
  </script>
  <script src="../shared/js/standard-env-banner.js?v=20260420-env"></script>
  <script>StandardEnvBanner.init('handy');</script>
  <!-- Phase 1: PWA 更新マネージャ -->
  <script src="../shared/js/pwa-update-manager.js?v=20260420-pwa1"></script>
  <script>PWAUpdateManager.init({ scope: 'handy', cachePrefix: 'posla-handy-' });</script>
  <!-- Phase 2a: Web Push 購読 + バッジ管理 -->
  <script src="../shared/js/push-subscription-manager.js?v=20260420-pwa2b"></script>
  <script src="../shared/js/badge-manager.js?v=20260420-pwa2a"></script>
  <script>
    (function () {
      'use strict';
      PushSubscriptionManager.init({ scope: 'handy' });

      // Phase 2b 修正: handy の store_id は HandyApp が localStorage 'mt_handy_store' に保存する。
      //   未確定では push_send_to_store の WHERE に乗らないため必須化。
      //   切替時 (店舗切替モーダル) のためにポーリングで再同期する。
      (function syncStoreId() {
        try {
          var s = localStorage.getItem('mt_handy_store');
          if (s) PushSubscriptionManager.setStoreId(s);
        } catch (e) {}
        setTimeout(syncStoreId, 5000);
      })();

      // PWA インストール済のときだけ通知設定 UI を出す (PC ブラウザ等では非表示)
      var isStandalone = (window.matchMedia && window.matchMedia('(display-mode: standalone)').matches)
                      || (window.navigator && window.navigator.standalone === true);
      // ハンディはヘッダ右側に通知設定ボタンを追加 (DOM 要素がない場合は何もしない)
      var headerRight = document.querySelector('.handy-header__right');
      if (headerRight && isStandalone) {
        var statusEl = document.createElement('span');
        statusEl.id = 'handy-push-status';
        statusEl.style.cssText = 'font-size:0.75rem;opacity:0.85;cursor:pointer;margin-right:8px;';
        statusEl.title = 'この端末で通知を受け取る設定 (タップで許可)';
        // ログアウトボタンの直前に挿入
        var logoutBtn = headerRight.querySelector('.handy-header__logout');
        if (logoutBtn) headerRight.insertBefore(statusEl, logoutBtn);
        else headerRight.appendChild(statusEl);

        var labels = {
          'unsupported': '通知: 未対応',
          'no_vapid':    '通知: 未設定',
          'denied':      '通知: ブロック中',
          'default':     '通知: 未設定',
          'granted':     '通知: 許可済',
          'subscribed':  '通知: 有効',
          'error':       '通知: エラー'
        };
        function refresh() {
          var s = PushSubscriptionManager.getState();
          statusEl.textContent = labels[s] || labels['default'];
        }
        refresh();
        setInterval(refresh, 2000);
        statusEl.addEventListener('click', function () {
          PushSubscriptionManager.requestPermission();
        });
      }

      // バッジ更新: ハンディの呼び出しアラート件数 (DOM スキャン)
      function updateBadge() {
        if (typeof BadgeManager === 'undefined') return;
        var items = document.querySelectorAll('.handy-call-item');
        BadgeManager.set(items.length);
      }
      setInterval(updateBadge, 5000);
      updateBadge();
    })();
  </script>
</body>
</html>
