<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>POSLA デバイスセットアップ</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
         background: #1a1a2e; color: #e0e0e0; display:flex; align-items:center;
         justify-content:center; min-height:100vh; }
  .setup-card { background: #16213e; border-radius: 16px; padding: 2rem;
                max-width: 400px; width: 90%; text-align: center; }
  .setup-card h1 { font-size: 1.5rem; margin-bottom: 1rem; color: #fff; }
  .setup-card p { font-size: 0.95rem; color: #90a4ae; margin-bottom: 1.5rem; }
  .setup-status { font-size: 1.1rem; padding: 1rem; border-radius: 8px; margin-bottom: 1rem; }
  .setup-status--loading { background: #1e3a5f; color: #64b5f6; }
  .setup-status--success { background: #1b5e20; color: #81c784; }
  .setup-status--error { background: #4a1010; color: #ef9a9a; }
  .setup-btn { display:inline-block; padding: 0.75rem 2rem; background: #ff6f00;
               color: #fff; border: none; border-radius: 8px; font-size: 1rem;
               cursor: pointer; text-decoration: none; margin-top: 1rem; }
  .setup-btn:disabled { opacity: 0.5; cursor: not-allowed; }
  .spinner { display:inline-block; width:20px; height:20px; border:3px solid #64b5f6;
             border-top-color:transparent; border-radius:50%; animation:spin 0.8s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }
</style>
  <!-- PWA -->
  <link rel="manifest" href="manifest.webmanifest">
  <link rel="apple-touch-icon" href="icons/apple-touch-icon.png">
</head>
<body>
<div class="setup-card">
  <h1>POSLA デバイスセットアップ</h1>
  <p>登録トークンを使ってデバイスを自動設定します。</p>
  <div id="setup-status" class="setup-status setup-status--loading">
    <span class="spinner"></span> 登録中...
  </div>
  <div id="setup-actions" style="display:none"></div>
</div>
<script>
(function () {
  'use strict';
  var params = new URLSearchParams(window.location.search);
  var token = params.get('token');
  var statusEl = document.getElementById('setup-status');
  var actionsEl = document.getElementById('setup-actions');

  if (!token) {
    statusEl.className = 'setup-status setup-status--error';
    statusEl.textContent = 'トークンが指定されていません。管理者から発行されたQRコードを読み取ってください。';
    return;
  }

  fetch('../../api/auth/device-register.php', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    credentials: 'same-origin',
    body: JSON.stringify({ token: token })
  })
  .then(function (r) {
    return r.text().then(function (t) {
      try { return JSON.parse(t); } catch (e) { return { ok: false, error: { message: t.substring(0, 120) } }; }
    });
  })
  .then(function (json) {
    if (!json.ok) {
      var msg = 'デバイス登録に失敗しました';
      if (json.error) msg += ': ' + (json.error.message || json.error.code || '');
      statusEl.className = 'setup-status setup-status--error';
      statusEl.textContent = msg;
      return;
    }
    var d = json.data;
    statusEl.className = 'setup-status setup-status--success';
    statusEl.innerHTML = '登録完了！<br><strong>' + escapeHtml(d.user.displayName) + '</strong>';

    // リダイレクト先を判定
    var tools = '';
    if (d.stores && d.stores[0]) tools = d.stores[0].userVisibleTools || '';
    var redirectUrl = '../kds/index.html';
    if (tools.indexOf('handy') >= 0) redirectUrl = '../handy/index.html';
    else if (tools.indexOf('register') >= 0) redirectUrl = '../kds/cashier.html';

    actionsEl.style.display = '';
    actionsEl.innerHTML = '<a class="setup-btn" href="' + escapeHtml(redirectUrl) + '">操作画面へ進む</a>';

    // 3秒後に自動遷移
    setTimeout(function () { window.location.href = redirectUrl; }, 3000);
  })
  .catch(function () {
    statusEl.className = 'setup-status setup-status--error';
    statusEl.textContent = '通信エラーが発生しました。ネットワーク接続を確認してください。';
  });

  function escapeHtml(str) {
    var d = document.createElement('div');
    d.textContent = str || '';
    return d.innerHTML;
  }
})();
</script>
  <script src="pwa-register.js"></script>
</body>
</html>
