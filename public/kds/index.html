<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#263238">
  <title>KDS - キッチンディスプレイ</title>
  <link rel="stylesheet" href="css/kds.css">
  <style>
    .kds-badge-course { background:#2e7d32; color:#fff; font-size:0.65rem; padding:1px 5px; border-radius:3px; white-space:nowrap; }
    .kds-card--course { border-left:3px solid #2e7d32; }
    .kds-course-bar { display:flex; gap:0.5rem; padding:0.25rem 0.75rem; background:var(--kds-bg-header); flex-wrap:wrap; }
    .kds-course-bar:empty { display:none; }
    .kds-advance-btn { background:#2e7d32; color:#fff; border:none; padding:0.35rem 0.75rem; border-radius:4px; font-size:0.8rem; cursor:pointer; }
    .kds-advance-btn:hover { background:#1b5e20; }
    .kds-advance-btn:disabled { opacity:0.5; cursor:not-allowed; }
    .kds-station-bar { display:flex; gap:0.5rem; padding:0.5rem 1rem; background:var(--kds-bg-surface); flex-wrap:wrap; }
    .kds-station-btn { background:var(--kds-bg-surface); color:var(--kds-text-muted); border:1px solid var(--kds-border); padding:0.35rem 0.75rem; border-radius:4px; font-size:0.8rem; cursor:pointer; }
    .kds-station-btn:hover { background:var(--kds-bg-surface-subtle); }
    .kds-station-btn.active { background:rgba(66,165,245,0.3); color:#fff; border-color:rgba(66,165,245,0.6); }
    html.light-theme .kds-station-btn { color:#555; background:#fff; border-color:#ccc; }
    html.light-theme .kds-station-btn:hover { background:#f0f0f0; }
    html.light-theme .kds-station-btn.active { background:#e3f2fd; color:#1565c0; border-color:#42a5f5; }
    /* KDS-P1-1: モード切替バー (通常 / まとめ表示) */
    .kds-mode-bar { display:flex; gap:0.5rem; padding:0.4rem 1rem; background:var(--kds-bg-surface); align-items:center; border-bottom:1px solid var(--kds-border); }
    .kds-mode-bar__label { font-size:0.72rem; color:var(--kds-text-muted); letter-spacing:0.05em; }
    .kds-mode-btn { background:var(--kds-bg-surface); color:var(--kds-text-muted); border:1px solid var(--kds-border); padding:0.3rem 0.9rem; border-radius:4px; font-size:0.82rem; cursor:pointer; font-family:inherit; }
    .kds-mode-btn:hover { background:var(--kds-bg-surface-subtle); }
    .kds-mode-btn.active { background:rgba(76,175,80,0.3); color:#fff; border-color:rgba(76,175,80,0.6); }
    html.light-theme .kds-mode-btn { color:#555; background:#fff; border-color:#ccc; }
    html.light-theme .kds-mode-btn:hover { background:#f0f0f0; }
    html.light-theme .kds-mode-btn.active { background:#e8f5e9; color:#2e7d32; border-color:#4caf50; }
    /* KDS-P1-1: expeditor 単一カラム + カードスタイル */
    .kds-board--expeditor { display:flex; flex-direction:column; overflow:hidden; }
    .kds-column--expeditor { flex:1; overflow-y:auto; padding:0.5rem 1rem 1rem; }
    .kds-card--expeditor { margin-bottom:0.75rem; }
    .kds-card--ready-priority { border-left:4px solid #4caf50; box-shadow:0 0 0 1px rgba(76,175,80,0.3); }
    .kds-expeditor-section { margin:0.35rem 0 0.5rem; }
    .kds-expeditor-section__title { font-size:0.72rem; font-weight:700; letter-spacing:0.05em; padding:2px 6px; border-radius:3px; display:inline-block; margin-bottom:0.2rem; }
    .kds-expeditor-section--ready .kds-expeditor-section__title { background:rgba(76,175,80,0.25); color:#8bc34a; }
    .kds-expeditor-section--preparing .kds-expeditor-section__title { background:rgba(66,165,245,0.25); color:#64b5f6; }
    .kds-expeditor-section--pending .kds-expeditor-section__title { background:rgba(158,158,158,0.25); color:#bdbdbd; }
    html.light-theme .kds-expeditor-section--ready .kds-expeditor-section__title { color:#2e7d32; background:#e8f5e9; }
    html.light-theme .kds-expeditor-section--preparing .kds-expeditor-section__title { color:#1565c0; background:#e3f2fd; }
    html.light-theme .kds-expeditor-section--pending .kds-expeditor-section__title { color:#616161; background:#f5f5f5; }
    /* KDS-P1-1 hotfix: 混在状態で一括ボタンを抑止、代わりに案内文を表示 */
    .kds-expeditor-hint { font-size:0.72rem; color:var(--kds-text-muted); padding:0.3rem 0.6rem; border:1px dashed var(--kds-border); border-radius:4px; }
    html.light-theme .kds-expeditor-hint { color:#666; border-color:#ccc; background:#fafafa; }
  </style>
  <!-- PWA -->
  <link rel="manifest" href="manifest.webmanifest">
  <link rel="apple-touch-icon" href="icons/apple-touch-icon.png">
</head>
<body>

  <!-- ヘッダー -->
  <header class="kds-header">
    <div class="kds-header__left">
      <span class="kds-header__title">KDS</span>
      <span class="kds-header__store-name" id="kds-store-name">-</span>
    </div>
    <div class="kds-header__right">
      <a href="#" class="kds-header__link" id="kds-change-store" style="display:none">店舗切替</a>
      <a href="sold-out.html" class="kds-header__link">品切れ管理</a>
      <button id="btn-ai-kitchen" onclick="AiKitchen.toggle()">&#x1F9D1;&#x200D;&#x1F373; AIシェフ</button>
      <span id="kds-wake-lock-status" class="kds-header__link" style="font-size:0.75rem;opacity:0.7;cursor:default;" title="画面が暗くならないようにする補助機能 (端末側設定の影響あり)"></span>
      <span id="kds-push-status" class="kds-header__link" style="font-size:0.75rem;opacity:0.7;cursor:pointer;" title="この端末で通知を受け取る設定 (タップで許可)"></span>
      <span class="kds-header__user" id="kds-user-name">-</span>
      <button class="kds-header__logout" id="btn-kds-logout">ログアウト</button>
    </div>
  </header>

  <!-- ステーション選択バー -->
  <div class="kds-station-bar" id="kds-station-bar"></div>

  <!-- コースフェーズ操作バー -->
  <div class="kds-course-bar" id="kds-course-bar"></div>

  <!-- KDS-P1-1: 表示モード切替バー (通常 3 列 / expeditor まとめ) -->
  <div class="kds-mode-bar" id="kds-mode-bar">
    <span class="kds-mode-bar__label">表示</span>
    <button type="button" class="kds-mode-btn active" data-kds-mode="normal">通常 (3列)</button>
    <button type="button" class="kds-mode-btn" data-kds-mode="expeditor">まとめ (提供順)</button>
  </div>

  <!-- キッチンモード: 既存の 3 列カンバン + KDS-P1-1 expeditor 追加コンテナ。
       event delegation は #kds-board に紐付くので expeditor カラムも同じ親配下に置く -->
  <div class="kds-board" id="kds-board">
    <!-- normal モード: 既存 3 列 -->
    <div class="kds-column kds-column--pending" data-kds-normal>
      <div class="kds-column__header">受付 <span class="kds-column__count" id="count-pending">0</span></div>
      <div class="kds-column__body" id="col-pending"></div>
    </div>
    <div class="kds-column kds-column--preparing" data-kds-normal>
      <div class="kds-column__header">調理中 <span class="kds-column__count" id="count-preparing">0</span></div>
      <div class="kds-column__body" id="col-preparing"></div>
    </div>
    <div class="kds-column kds-column--ready" data-kds-normal>
      <div class="kds-column__header">提供待ち <span class="kds-column__count" id="count-ready">0</span></div>
      <div class="kds-column__body" id="col-ready"></div>
    </div>
    <!-- KDS-P1-1 expeditor モード: 単一カラム。style で初期 hide -->
    <div class="kds-column kds-column--expeditor" id="kds-column-expeditor" data-kds-expeditor style="display:none">
      <div class="kds-column__header">まとめ (提供可能が上位)</div>
      <div class="kds-column__body" id="col-expeditor"></div>
    </div>
  </div>

  <!-- トースト -->
  <div class="kds-toast" id="kds-toast"></div>

  <!-- 店舗選択オーバーレイ -->
  <div class="kds-store-overlay" id="kds-store-overlay" style="display:none">
    <div class="kds-store-overlay__box">
      <div class="kds-store-overlay__title">店舗を選択してください</div>
      <div class="kds-store-overlay__list" id="kds-store-list"></div>
    </div>
  </div>

  <!-- KDS起動オーバーレイ -->
  <div id="kds-startup-overlay" style="display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.88);z-index:9999;align-items:center;justify-content:center;">
    <div style="text-align:center;color:#fff;">
      <div style="font-size:3.5rem;margin-bottom:0.75rem;">&#x1F373;</div>
      <div style="font-size:1.4rem;font-weight:bold;margin-bottom:0.3rem;">KDS キッチンディスプレイ</div>
      <div id="kds-startup-store" style="font-size:0.95rem;color:#aaa;margin-bottom:2rem;"></div>
      <button id="kds-startup-btn" style="background:#4CAF50;color:#fff;border:none;padding:1rem 3rem;border-radius:8px;font-size:1.2rem;cursor:pointer;min-width:200px;">KDSを開始</button>
      <div style="font-size:0.75rem;color:#666;margin-top:1rem;">音声コマンド・通知音が有効になります</div>
    </div>
  </div>

  <script src="../shared/js/utils.js?v=20260419-phaseB"></script>
  <script src="../shared/js/revision-gate.js?v=20260420-rev2"></script>
  <script src="js/kds-auth.js?v=20260418gps"></script>
  <script src="js/polling-data-source.js?v=20260420-pwa3"></script>
  <script src="js/kds-renderer.js?v=20260429-ops-undo1"></script>
  <script src="js/voice-commander.js?v=20260420-pwa3c"></script>
  <script src="js/ai-kitchen.js"></script>
  <script>
  (function () {
    'use strict';

    var _stationId = '';

    function showStoreOverlay(stores, onSelect) {
      var overlay = document.getElementById('kds-store-overlay');
      var list = document.getElementById('kds-store-list');
      var html = '';
      stores.forEach(function (s) {
        html += '<button class="kds-store-overlay__btn" data-store-id="' + s.id + '">' + Utils.escapeHtml(s.name) + '</button>';
      });
      list.innerHTML = html;
      overlay.style.display = 'flex';

      list.addEventListener('click', function handler(e) {
        var btn = e.target.closest('.kds-store-overlay__btn');
        if (!btn) return;
        list.removeEventListener('click', handler);
        overlay.style.display = 'none';
        onSelect(btn.dataset.storeId);
      });
    }

    // Phase 1 (修正版): Wake Lock 取得を共通化。
    //   3 経路で呼ぶ:
    //     1. 起動オーバーレイの「KDSを開始」ボタン押下 (user gesture あり: 成功率高)
    //     2. 複数店舗の店舗選択クリック (user gesture あり: 成功率高)
    //     3. mt_kds_started 済でオーバーレイをスキップする経路 (user gesture なし: 失敗する可能性あり)
    //   → 失敗時 (state='blocked') のリカバリは _setupWakeLockRecovery() でステータス要素クリックを使う
    function _tryAcquireWakeLock() {
      if (typeof WakeLockHelper !== 'undefined') {
        WakeLockHelper.acquire();
      }
    }

    // ステータス表示要素をクリック可能にして、Wake Lock が取得できなかったときに
    // 現場スタッフが手動でリカバリできるようにする。
    function _setupWakeLockRecovery() {
      var statusEl = document.getElementById('kds-wake-lock-status');
      if (!statusEl) return;
      statusEl.style.cursor = 'pointer';
      statusEl.title = '画面が暗くならないようにする補助機能。タップで再取得を試します。';
      statusEl.addEventListener('click', _tryAcquireWakeLock);
    }

    // ── 起動オーバーレイ（オーディオ解禁用・セッション初回のみ表示） ──
    function showStartupOverlay(storeName, callback) {
      // 同一セッション内の2回目以降（ページ遷移して戻った場合）はスキップ
      if (sessionStorage.getItem('mt_kds_started')) {
        // 経路 3: ユーザー操作なしで自動取得を試す。失敗時はステータス要素クリックで復旧
        _tryAcquireWakeLock();
        callback();
        return;
      }
      var overlay = document.getElementById('kds-startup-overlay');
      var storeEl = document.getElementById('kds-startup-store');
      if (storeName) storeEl.textContent = storeName;
      overlay.style.display = 'flex';
      document.getElementById('kds-startup-btn').addEventListener('click', function () {
        VoiceCommander.unlockAudio();
        // 経路 1: 起動ボタン (user gesture あり)
        _tryAcquireWakeLock();
        sessionStorage.setItem('mt_kds_started', '1');
        overlay.style.display = 'none';
        callback();
      });
    }

    KdsAuth.init().catch(function () {}).then(function (ctx) {
      if (!ctx) return;
      document.getElementById('kds-user-name').textContent = ctx.user.displayName || ctx.user.email;

      // 店舗名テキスト表示
      var storeNameEl = document.getElementById('kds-store-name');
      var changeLinkEl = document.getElementById('kds-change-store');
      var currentStore = ctx.stores.find(function (s) { return s.id === ctx.storeId; });
      if (currentStore) storeNameEl.textContent = currentStore.name;

      // 複数店舗: オーバーレイまたは切替リンク
      if (ctx.stores.length > 1) {
        var savedStore = localStorage.getItem('mt_kds_store');
        if (!savedStore || !ctx.stores.some(function (s) { return s.id === savedStore; })) {
          // 初回: オーバーレイで選択を強制（クリックでオーディオも解禁）
          showStoreOverlay(ctx.stores, function (selectedId) {
            VoiceCommander.unlockAudio();
            // 経路 2: 店舗選択クリック (user gesture あり)
            _tryAcquireWakeLock();
            KdsAuth.setStore(selectedId);
            var s = ctx.stores.find(function (x) { return x.id === selectedId; });
            storeNameEl.textContent = s ? s.name : '-';
            changeLinkEl.style.display = '';
            sessionStorage.setItem('mt_kds_started', '1');
            // GPS チェック後に initMain
            KdsAuth.checkGps(selectedId, initMain);
          });
          return;
        }
        // 2回目以降: 切替リンク表示
        changeLinkEl.style.display = '';
        changeLinkEl.addEventListener('click', function (e) {
          e.preventDefault();
          showStoreOverlay(ctx.stores, function (selectedId) {
            VoiceCommander.unlockAudio();
            // 経路 2: 店舗切替クリック (user gesture あり) — sentinel が release されている場合の再取得
            _tryAcquireWakeLock();
            KdsAuth.setStore(selectedId);
            var s = ctx.stores.find(function (x) { return x.id === selectedId; });
            storeNameEl.textContent = s ? s.name : '-';
            // GPS チェック後に再開
            KdsAuth.checkGps(selectedId, function () {
              VoiceCommander.onStoreChange();
              restartPolling();
            });
          });
        });
      }

      // 起動オーバーレイ → GPS チェック → initMain
      showStartupOverlay(currentStore ? currentStore.name : '', function () {
        KdsAuth.checkGps(ctx.storeId, initMain);
      });

      // ── メイン初期化 ──
      function initMain() {
        _stationId = localStorage.getItem('mt_kds_station') || '';
        renderStationButtons([]);

        if (_stationId === '__cashier__') {
          _stationId = '';
          localStorage.removeItem('mt_kds_station');
        }

        // ステーションバーのクリック
        document.getElementById('kds-station-bar').addEventListener('click', function (e) {
          var btn = e.target.closest('.kds-station-btn');
          if (!btn) return;
          _stationId = btn.dataset.station;
          if (_stationId) localStorage.setItem('mt_kds_station', _stationId);
          else localStorage.removeItem('mt_kds_station');

          var btns = document.querySelectorAll('.kds-station-btn');
          for (var i = 0; i < btns.length; i++) {
            btns[i].classList.toggle('active', btns[i].dataset.station === _stationId);
          }

          restartPolling();
        });

        KdsRenderer.init(
          document.getElementById('col-pending'),
          document.getElementById('col-preparing'),
          document.getElementById('col-ready')
        );
        // KDS-P1-1: expeditor モード用コンテナを登録
        KdsRenderer.initExpeditor(document.getElementById('col-expeditor'));

        // KDS-P1-1: 表示モード切替 (localStorage で保持)
        (function () {
          var savedMode = 'normal';
          try {
            var v = localStorage.getItem('kds_view_mode');
            if (v === 'expeditor' || v === 'normal') savedMode = v;
          } catch (e) { /* noop */ }
          applyMode(savedMode);

          var modeBar = document.getElementById('kds-mode-bar');
          if (modeBar) {
            modeBar.addEventListener('click', function (e) {
              var btn = e.target.closest('[data-kds-mode]');
              if (!btn) return;
              var mode = btn.getAttribute('data-kds-mode');
              if (mode !== 'normal' && mode !== 'expeditor') return;
              try { localStorage.setItem('kds_view_mode', mode); } catch (ex) { /* noop */ }
              applyMode(mode);
            });
          }

          function applyMode(mode) {
            // ボタン active 切替
            var btns = document.querySelectorAll('[data-kds-mode]');
            for (var i = 0; i < btns.length; i++) {
              btns[i].className = btns[i].getAttribute('data-kds-mode') === mode
                ? 'kds-mode-btn active'
                : 'kds-mode-btn';
            }
            // 表示切替
            var normals = document.querySelectorAll('[data-kds-normal]');
            for (var j = 0; j < normals.length; j++) {
              normals[j].style.display = (mode === 'expeditor') ? 'none' : '';
            }
            var exps = document.querySelectorAll('[data-kds-expeditor]');
            for (var k = 0; k < exps.length; k++) {
              exps[k].style.display = (mode === 'expeditor') ? '' : 'none';
            }
            KdsRenderer.setMode(mode);
          }
        })();

        VoiceCommander.init();
        startPolling();

        // カンバンのアクションボタン
        document.getElementById('kds-board').addEventListener('click', function (e) {
          // 品目単位のアクションボタン
          var itemBtn = e.target.closest('.kds-item-action');
          if (itemBtn) {
            // Phase 3: offline/stale 時に reject されるので unhandled rejection を避けるため握りつぶす
            KdsRenderer.handleItemAction(itemBtn.dataset.itemId, itemBtn.dataset.itemStatus, KdsAuth.getStoreId())
              .catch(function () { /* offline/stale or api error */ });
            return;
          }
          // 注文単位のアクションボタン
          var btn = e.target.closest('.kds-card__action') || e.target.closest('.kds-card__cancel');
          if (!btn) return;
          var reason = null;
          if (btn.dataset.status === 'cancelled') {
            if (!confirm('この注文をキャンセルしますか？')) return;
            reason = prompt('キャンセル理由を入力してください', '');
            if (!reason || !reason.trim()) return;
          }
          KdsRenderer.handleAction(btn.dataset.order, btn.dataset.status, KdsAuth.getStoreId(), reason)
            .catch(function () { /* offline/stale or api error */ });
        });

        // コースフェーズバー
        document.getElementById('kds-course-bar').addEventListener('click', function (e) {
          var btn = e.target.closest('.kds-advance-btn');
          if (!btn) return;
          var tableId = btn.dataset.tableId;
          if (!confirm('次のフェーズに進みますか？（現フェーズの未完了品目は全て提供済みになります）')) return;
          btn.disabled = true;
          btn.textContent = '処理中...';
          KdsRenderer.advancePhase(KdsAuth.getStoreId(), tableId)
            .then(function (json) {
              if (json && json.ok && json.data) {
                var msg = json.data.completed ? 'コース完了' : json.data.message;
                btn.textContent = msg || '完了';
              } else {
                btn.textContent = (window.Utils && Utils.formatError) ? Utils.formatError(json) : ((json && json.error && json.error.message) || 'エラー');
              }
              setTimeout(function () { btn.disabled = false; }, 1000);
            })
            .catch(function () {
              // Phase 3: offline/stale では reject。ボタンを戻して握りつぶす
              btn.textContent = '\u901A\u4FE1\u4E0D\u5B89\u5B9A';
              setTimeout(function () { btn.disabled = false; }, 1500);
            });
        });
      }

      // ── ポーリング制御 ──
      function startPolling() {
        var storeId = KdsAuth.getStoreId();
        var sid = _stationId === '__cashier__' ? '' : _stationId;
        PollingDataSource.start(storeId, function (data) {
          clearError();
          if (data.stations) renderStationButtons(data.stations);
          KdsRenderer.onData(data);
          VoiceCommander.updateOrders(data.orders || []);
          if (window.AiKitchen) AiKitchen.onPollingData(data);
          updateCourseBar();
        }, handleError, sid);
      }

      function restartPolling() {
        PollingDataSource.stop();
        startPolling();
      }

      function updateCourseBar() {
        var bar = document.getElementById('kds-course-bar');
        var courseTables = KdsRenderer.getCourseTableIds();
        if (courseTables.length === 0) { bar.innerHTML = ''; return; }
        bar.innerHTML = courseTables.map(function (ct) {
          return '<button class="kds-advance-btn" data-table-id="' + ct.tableId + '">'
            + Utils.escapeHtml(ct.tableCode) + ' ' + Utils.escapeHtml(ct.courseName)
            + ' P' + ct.currentPhase + ' → 次フェーズ</button>';
        }).join('');
      }

      // ── ステーションボタン描画 ──
      function renderStationButtons(stations) {
        var bar = document.getElementById('kds-station-bar');
        var html = '<button class="kds-station-btn' + (_stationId === '' ? ' active' : '') + '" data-station="">全品目</button>';
        (stations || []).forEach(function (st) {
          html += '<button class="kds-station-btn' + (_stationId === st.id ? ' active' : '') + '" data-station="' + Utils.escapeHtml(st.id) + '">' + Utils.escapeHtml(st.name) + '</button>';
        });
        bar.innerHTML = html;
      }

      function handleError(errMsg) {
        console.error('KDS polling error:', errMsg);
        var errEl = document.getElementById('kds-error');
        if (!errEl) {
          errEl = document.createElement('div');
          errEl.id = 'kds-error';
          errEl.style.cssText = 'background:#d32f2f;color:#fff;padding:0.5rem 1rem;text-align:center;font-size:0.875rem;';
          document.querySelector('.kds-header').after(errEl);
        }
        errEl.textContent = 'エラー: ' + errMsg;
        errEl.style.display = '';
      }

      function clearError() {
        var errEl = document.getElementById('kds-error');
        if (errEl) errEl.style.display = 'none';
      }
    });

    // ログアウト
    document.getElementById('btn-kds-logout').addEventListener('click', function () {
      fetch('../../api/auth/logout.php', { method: 'DELETE', credentials: 'same-origin' })
        .finally(function () { window.location.href = '../admin/index.html'; });
    });
  })();
  </script>

      if (typeof WakeLockHelper === 'undefined') return;

  <!-- Phase 2a: Web Push 購読 + バッジ管理 -->
  <script src="../shared/js/push-subscription-manager.js?v=20260420-pwa2b"></script>
  <script src="../shared/js/badge-manager.js?v=20260420-pwa2a"></script>
  <script>
    (function () {
      'use strict';
      // KDS の store_id は KdsAuth が解決するため、init は scope だけで開始し、
      // KdsAuth から storeId を取得できるようになり次第 setStoreId で反映する。
      // Phase 2b 修正: store_id 未紐付けでは push_send_to_store の WHERE に乗らないため必須化。
      PushSubscriptionManager.init({ scope: 'kds' });

      (function pollStoreId() {
        var s = (typeof KdsAuth !== 'undefined' && KdsAuth.getStoreId) ? KdsAuth.getStoreId() : null;
        if (s) {
          PushSubscriptionManager.setStoreId(s);
          return;
        }
        setTimeout(pollStoreId, 1000);
      })();

      // ヘッダの状態表示要素を attach (compact UI)
      var statusEl = document.getElementById('kds-push-status');
      // PWA インストール済のときだけ通知ステータスを表示する (PC ブラウザ等では非表示)
      var isStandalone = (window.matchMedia && window.matchMedia('(display-mode: standalone)').matches)
                      || (window.navigator && window.navigator.standalone === true);
      if (statusEl && !isStandalone) {
        statusEl.style.display = 'none';
        statusEl = null;   // 以下の処理もスキップ
      }
      if (statusEl) {
        // attachUI は別 div を append する設計なので、ここでは状態テキストを
        // 直接 statusEl に書き込む簡易バージョンを使う
        var labels = {
          'unsupported': '通知: 未対応',
          'no_vapid':    '通知: 未設定',
          'denied':      '通知: ブロック中',
          'default':     '通知: 未設定 (タップで許可)',
          'granted':     '通知: 許可済み',
          'subscribed':  '通知: 有効',
          'error':       '通知: エラー'
        };
        function refresh() {
          var s = PushSubscriptionManager.getState();
          statusEl.textContent = labels[s] || labels['default'];
        }
        // ポーリングで状態を反映 (PushSubscriptionManager は内部で _setState を持つが
        // 外部コールバック登録 API がない compact 用途なので 2 秒ごとに getState で十分)
        refresh();
        setInterval(refresh, 2000);
        statusEl.addEventListener('click', function () {
          PushSubscriptionManager.requestPermission();
        });
      }

      // バッジ更新: KDS 呼び出しアラート件数 (KdsAlert の内部状態を読まず DOM から数える)
      // 既存ポーリング (5 秒) が DOM を更新するので、5 秒ごとに DOM をスキャン
      function updateBadge() {
        if (typeof BadgeManager === 'undefined') return;
        var items = document.querySelectorAll('.kds-call-item');
        BadgeManager.set(items.length);
      }
      setInterval(updateBadge, 5000);
      updateBadge();
    })();
  </script>
