<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#263238">
  <title>KDS - キッチンディスプレイ</title>
  <link rel="stylesheet" href="css/kds.css?v=20260429-kds-terminal-prep">
  <style>
    .kds-badge-course { background:#2e7d32; color:#fff; font-size:0.65rem; padding:1px 5px; border-radius:3px; white-space:nowrap; }
    .kds-card--course { border-left:3px solid #2e7d32; }
    .kds-course-bar { display:flex; gap:0.5rem; padding:0.25rem 0.75rem; background:var(--kds-bg-header); flex-wrap:wrap; }
    .kds-course-bar:empty { display:none; }
    .kds-advance-btn { background:#2e7d32; color:#fff; border:none; padding:0.35rem 0.75rem; border-radius:4px; font-size:0.8rem; cursor:pointer; }
    .kds-advance-btn:hover { background:#1b5e20; }
    .kds-advance-btn:disabled { opacity:0.5; cursor:not-allowed; }
    .kds-station-bar { display:flex; gap:0.5rem; padding:0.5rem 1rem; background:var(--kds-bg-surface); flex-wrap:wrap; }
    .kds-station-btn { background:var(--kds-bg-surface); color:var(--kds-text-muted); border:1px solid var(--kds-border); padding:0.35rem 0.75rem; border-radius:4px; font-size:0.8rem; cursor:pointer; }
    .kds-station-btn:hover { background:var(--kds-bg-surface-subtle); }
    .kds-station-btn.active { background:rgba(66,165,245,0.3); color:#fff; border-color:rgba(66,165,245,0.6); }
    .kds-station-btn--prep.active { background:rgba(66,165,245,0.32); border-color:#42a5f5; color:#fff; }
    .kds-station-btn--warning.active { background:rgba(255,179,0,0.32); border-color:#ffb300; color:#fff; }
    .kds-station-btn--danger.active { background:rgba(255,82,82,0.36); border-color:#ff5252; color:#fff; animation:kds-station-pulse 1.2s infinite; }
    @keyframes kds-station-pulse { 50% { box-shadow:0 0 0 3px rgba(255,82,82,0.18); } }
    .kds-station-focus { display:flex; align-items:center; gap:0.75rem; min-height:42px; padding:0.45rem 1rem; background:rgba(255,255,255,0.035); border-bottom:1px solid var(--kds-border); border-left:4px solid transparent; font-size:0.82rem; overflow-x:auto; -webkit-overflow-scrolling:touch; }
    .kds-station-focus__name { font-weight:900; color:var(--kds-text); white-space:nowrap; }
    .kds-station-focus__status { font-weight:900; white-space:nowrap; }
    .kds-station-focus__metric { color:var(--kds-text-muted); white-space:nowrap; }
    .kds-station-focus__reason { color:var(--kds-text-secondary); font-weight:800; white-space:nowrap; }
    .kds-station-focus--prep { border-left-color:#42a5f5; background:rgba(66,165,245,0.08); }
    .kds-station-focus--prep .kds-station-focus__status { color:#64b5f6; }
    .kds-station-focus--warning { border-left-color:#ffb300; background:rgba(255,179,0,0.10); }
    .kds-station-focus--warning .kds-station-focus__status { color:#ffcc33; }
    .kds-station-focus--danger { border-left-color:#ff5252; background:rgba(255,82,82,0.12); }
    .kds-station-focus--danger .kds-station-focus__status { color:#ff6b6b; }
    html.light-theme .kds-station-btn { color:#555; background:#fff; border-color:#ccc; }
    html.light-theme .kds-station-btn:hover { background:#f0f0f0; }
    html.light-theme .kds-station-btn.active { background:#e3f2fd; color:#1565c0; border-color:#42a5f5; }
    html.light-theme .kds-station-focus { background:#fff; }
    html.light-theme .kds-station-focus--prep { background:#e3f2fd; }
    html.light-theme .kds-station-focus--warning { background:#fff8e1; }
    html.light-theme .kds-station-focus--danger { background:#ffebee; }
    /* KDS-P1-1: モード切替バー (通常 / まとめ表示) */
    .kds-mode-bar { display:flex; gap:0.5rem; padding:0.4rem 1rem; background:var(--kds-bg-surface); align-items:center; border-bottom:1px solid var(--kds-border); }
    .kds-mode-bar__label { font-size:0.72rem; color:var(--kds-text-muted); letter-spacing:0.05em; }
    .kds-mode-btn { background:var(--kds-bg-surface); color:var(--kds-text-muted); border:1px solid var(--kds-border); padding:0.3rem 0.9rem; border-radius:4px; font-size:0.82rem; cursor:pointer; font-family:inherit; }
    .kds-mode-btn:hover { background:var(--kds-bg-surface-subtle); }
    .kds-mode-btn.active { background:rgba(76,175,80,0.3); color:#fff; border-color:rgba(76,175,80,0.6); }
    html.light-theme .kds-mode-btn { color:#555; background:#fff; border-color:#ccc; }
    html.light-theme .kds-mode-btn:hover { background:#f0f0f0; }
    html.light-theme .kds-mode-btn.active { background:#e8f5e9; color:#2e7d32; border-color:#4caf50; }
    /* KDS-P1-1: expeditor 単一カラム + カードスタイル */
    .kds-board--expeditor { display:flex; flex-direction:column; overflow:hidden; }
    .kds-column--expeditor { flex:1; overflow-y:auto; padding:0.5rem 1rem 1rem; }
    .kds-card--expeditor { margin-bottom:0.75rem; }
    .kds-card--ready-priority { border-left:4px solid #4caf50; box-shadow:0 0 0 1px rgba(76,175,80,0.3); }
    .kds-expeditor-section { margin:0.35rem 0 0.5rem; }
    .kds-expeditor-section__title { font-size:0.72rem; font-weight:700; letter-spacing:0.05em; padding:2px 6px; border-radius:3px; display:inline-block; margin-bottom:0.2rem; }
    .kds-expeditor-section--ready .kds-expeditor-section__title { background:rgba(76,175,80,0.25); color:#8bc34a; }
    .kds-expeditor-section--preparing .kds-expeditor-section__title { background:rgba(66,165,245,0.25); color:#64b5f6; }
    .kds-expeditor-section--pending .kds-expeditor-section__title { background:rgba(158,158,158,0.25); color:#bdbdbd; }
    html.light-theme .kds-expeditor-section--ready .kds-expeditor-section__title { color:#2e7d32; background:#e8f5e9; }
    html.light-theme .kds-expeditor-section--preparing .kds-expeditor-section__title { color:#1565c0; background:#e3f2fd; }
    html.light-theme .kds-expeditor-section--pending .kds-expeditor-section__title { color:#616161; background:#f5f5f5; }
    /* KDS-P1-1 hotfix: 混在状態で一括ボタンを抑止、代わりに案内文を表示 */
    .kds-expeditor-hint { font-size:0.72rem; color:var(--kds-text-muted); padding:0.3rem 0.6rem; border:1px dashed var(--kds-border); border-radius:4px; }
    html.light-theme .kds-expeditor-hint { color:#666; border-color:#ccc; background:#fafafa; }
  </style>

  <link rel="manifest" href="manifest.webmanifest">

</head>
<body>

  <!-- ヘッダー -->
  <header class="kds-header">
    <div class="kds-header__left">
      <span class="kds-header__title">KDS</span>
      <span class="kds-header__store-name" id="kds-store-name">-</span>
    </div>
    <div class="kds-header__right">
      <a href="#" class="kds-header__link" id="kds-change-store" style="display:none">店舗切替</a>
      <a href="sold-out.html" class="kds-header__link">品切れ管理</a>
      <button type="button" class="kds-header__link kds-prep-settings-btn" id="kds-prep-lead-btn">着手時間</button>
      <button type="button" class="kds-header__link kds-preflight-btn" id="kds-preflight-btn">開店前チェック</button>
      <button id="btn-ai-kitchen" onclick="AiKitchen.toggle()">&#x1F9D1;&#x200D;&#x1F373; AIシェフ</button>
      <span id="kds-wake-lock-status" class="kds-header__link" style="font-size:0.75rem;opacity:0.7;cursor:default;" title="画面が暗くならないようにする補助機能 (端末側設定の影響あり)"></span>
      <span id="kds-push-status" class="kds-header__link" style="font-size:0.75rem;opacity:0.7;cursor:pointer;" title="この端末で通知を受け取る設定 (タップで許可)"></span>
      <span class="kds-header__user" id="kds-user-name">-</span>
      <button class="kds-header__logout" id="btn-kds-logout">ログアウト</button>
    </div>
  </header>

  <!-- ステーション選択バー -->
  <div class="kds-station-bar" id="kds-station-bar"></div>
  <div class="kds-station-focus" id="kds-station-focus"></div>
  <div class="kds-terminal-status" id="kds-terminal-status" aria-live="polite"></div>

  <!-- コースフェーズ操作バー -->
  <div class="kds-course-bar" id="kds-course-bar"></div>

  <!-- KDS-P1-1: 表示モード切替バー (通常 3 列 / expeditor まとめ) -->
  <div class="kds-mode-bar" id="kds-mode-bar">
    <span class="kds-mode-bar__label">表示</span>
    <button type="button" class="kds-mode-btn active" data-kds-mode="normal">通常 (3列)</button>
    <button type="button" class="kds-mode-btn" data-kds-mode="expeditor">まとめ (提供順)</button>
  </div>

  <!-- キッチンモード: 既存の 3 列カンバン + KDS-P1-1 expeditor 追加コンテナ。
       event delegation は #kds-board に紐付くので expeditor カラムも同じ親配下に置く -->
  <div class="kds-board" id="kds-board">
    <!-- normal モード: 既存 3 列 -->
    <div class="kds-column kds-column--pending" data-kds-normal>
      <div class="kds-column__header">受付 <span class="kds-column__count" id="count-pending">0</span></div>
      <div class="kds-column__body" id="col-pending"></div>
    </div>
    <div class="kds-column kds-column--preparing" data-kds-normal>
      <div class="kds-column__header">調理中 <span class="kds-column__count" id="count-preparing">0</span></div>
      <div class="kds-column__body" id="col-preparing"></div>
    </div>
    <div class="kds-column kds-column--ready" data-kds-normal>
      <div class="kds-column__header">提供待ち <span class="kds-column__count" id="count-ready">0</span></div>
      <div class="kds-column__body" id="col-ready"></div>
    </div>
    <!-- KDS-P1-1 expeditor モード: 単一カラム。style で初期 hide -->
    <div class="kds-column kds-column--expeditor" id="kds-column-expeditor" data-kds-expeditor style="display:none">
      <div class="kds-column__header">まとめ (提供可能が上位)</div>
      <div class="kds-column__body" id="col-expeditor"></div>
    </div>
  </div>

  <!-- トースト -->
  <div class="kds-toast" id="kds-toast"></div>

  <!-- 店舗選択オーバーレイ -->
  <div class="kds-store-overlay" id="kds-store-overlay" style="display:none">
    <div class="kds-store-overlay__box">
      <div class="kds-store-overlay__title">店舗を選択してください</div>
      <div class="kds-store-overlay__list" id="kds-store-list"></div>
    </div>
  </div>

  <!-- KDS起動オーバーレイ -->
  <div id="kds-startup-overlay" style="display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.88);z-index:9999;align-items:center;justify-content:center;">
    <div style="text-align:center;color:#fff;">
      <div style="font-size:3.5rem;margin-bottom:0.75rem;">&#x1F373;</div>
      <div style="font-size:1.4rem;font-weight:bold;margin-bottom:0.3rem;">KDS キッチンディスプレイ</div>
      <div id="kds-startup-store" style="font-size:0.95rem;color:#aaa;margin-bottom:2rem;"></div>
      <button id="kds-startup-btn" style="background:#4CAF50;color:#fff;border:none;padding:1rem 3rem;border-radius:8px;font-size:1.2rem;cursor:pointer;min-width:200px;">KDSを開始</button>
      <div style="font-size:0.75rem;color:#666;margin-top:1rem;">音声コマンド・通知音が有効になります</div>
    </div>
  </div>

  <script src="../shared/js/utils.js?v=20260419-phaseB"></script>
  <script src="../shared/js/revision-gate.js?v=20260420-rev2"></script>
  <script src="js/kds-auth.js?v=20260418gps"></script>
  <script src="js/polling-data-source.js?v=20260420-pwa3"></script>
  <script src="js/kds-renderer.js?v=20260429-kds-terminal-prep"></script>
  <script src="js/voice-commander.js?v=20260429-kds-p0g"></script>
  <script src="js/ai-kitchen.js?v=20260429-visible"></script>
  <script>
  (function () {
    'use strict';

    var _stationId = '';
    var _stationSoundCtx = null;
    var _stationSoundSnapshot = {};
    var _lastPollingAt = 0;
    var _lastPollingError = '';
    var _lastStationSummary = null;
    var _preflightOverlay = null;
    var _preflightMicStream = null;
    var _preflightMicCtx = null;
    var _preflightMicRaf = null;
    var _PREP_LEAD_KEY = 'mt_kds_prep_lead_v1';
    var _VOICE_DIAG_KEY = 'mt_kds_voice_diag_v1';
    var _prepLeadConfig = null;
    var _prepCategoryMap = {};
    var _prepSettingsOverlay = null;
    var _terminalStatusTimer = null;

    function _stationKey() {
      return _stationId || '__all__';
    }

    function _unlockStationAudio() {
      var Ctx = window.AudioContext || window.webkitAudioContext;
      if (!Ctx) return null;
      if (!_stationSoundCtx) {
        try { _stationSoundCtx = new Ctx(); } catch (e) { return null; }
      }
      if (_stationSoundCtx && _stationSoundCtx.state === 'suspended') {
        try { _stationSoundCtx.resume(); } catch (ex) {}
      }
      return _stationSoundCtx;
    }

    function _playStationTone(kind) {
      var ctx = _unlockStationAudio();
      if (!ctx) return;
      function tone(freq, delayMs, durationMs, volume) {
        try {
          var osc = ctx.createOscillator();
          var gain = ctx.createGain();
          var start = ctx.currentTime + (delayMs / 1000);
          var end = start + (durationMs / 1000);
          osc.type = kind === 'danger' ? 'square' : 'sine';
          osc.frequency.setValueAtTime(freq, start);
          gain.gain.setValueAtTime(0.0001, start);
          gain.gain.exponentialRampToValueAtTime(volume || 0.035, start + 0.015);
          gain.gain.exponentialRampToValueAtTime(0.0001, end);
          osc.connect(gain);
          gain.connect(ctx.destination);
          osc.start(start);
          osc.stop(end + 0.02);
        } catch (e) {}
      }
      if (kind === 'danger') {
        tone(330, 0, 120, 0.04);
        tone(660, 150, 120, 0.04);
        tone(330, 300, 160, 0.04);
      } else if (kind === 'warning') {
        tone(740, 0, 90, 0.035);
        tone(740, 130, 90, 0.035);
      } else if (kind === 'prep') {
        tone(660, 0, 80, 0.025);
      } else if (kind === 'ready') {
        tone(880, 0, 80, 0.03);
        tone(1100, 115, 80, 0.03);
      }
    }

    function _normalizePrepMin(value, fallback) {
      var n = parseInt(value, 10);
      if (isNaN(n)) return fallback;
      if (n < 0) return 0;
      if (n > 180) return 180;
      return n;
    }

    function _defaultPrepLeadConfig() {
      return {
        version: 1,
        defaultMin: 20,
        takeoutMin: 20,
        reservationMin: 20,
        categories: {}
      };
    }

    function _loadPrepLeadConfig() {
      var cfg = _defaultPrepLeadConfig();
      try {
        var raw = localStorage.getItem(_PREP_LEAD_KEY);
        if (raw) {
          var parsed = JSON.parse(raw);
          if (parsed && typeof parsed === 'object') {
            cfg.defaultMin = _normalizePrepMin(parsed.defaultMin, cfg.defaultMin);
            cfg.takeoutMin = _normalizePrepMin(parsed.takeoutMin, cfg.takeoutMin);
            cfg.reservationMin = _normalizePrepMin(parsed.reservationMin, cfg.reservationMin);
            var cats = parsed.categories || {};
            Object.keys(cats).forEach(function (catId) {
              var min = _normalizePrepMin(cats[catId], null);
              if (catId && min !== null) cfg.categories[catId] = min;
            });
          }
        }
      } catch (e) {}
      _prepLeadConfig = cfg;
      return cfg;
    }

    function _applyPrepLeadConfig() {
      if (!_prepLeadConfig) _loadPrepLeadConfig();
      if (typeof KdsRenderer !== 'undefined' && KdsRenderer.setPrepLeadConfig) {
        KdsRenderer.setPrepLeadConfig(_prepLeadConfig);
      }
    }

    function _savePrepLeadConfig(config) {
      _prepLeadConfig = config || _defaultPrepLeadConfig();
      try { localStorage.setItem(_PREP_LEAD_KEY, JSON.stringify(_prepLeadConfig)); } catch (e) {}
      _applyPrepLeadConfig();
    }

    function _rememberPrepCategory(id, name) {
      if (!id) return;
      _prepCategoryMap[id] = name || 'カテゴリ';
    }

    function _collectPrepCategoriesFromOrders(orders) {
      var list = orders || [];
      for (var i = 0; i < list.length; i++) {
        var items = list[i].items || [];
        for (var j = 0; j < items.length; j++) {
          _rememberPrepCategory(items[j].category_id, items[j].category_name || '');
        }
      }
    }

    function _fetchPrepCategories() {
      var storeId = (typeof KdsAuth !== 'undefined' && KdsAuth.getStoreId) ? KdsAuth.getStoreId() : '';
      if (!storeId) return Promise.resolve();
      return fetch('../../api/kds/sold-out.php?store_id=' + encodeURIComponent(storeId), { credentials: 'same-origin' })
        .then(function (res) { return res.text(); })
        .then(function (body) {
          var json = body ? JSON.parse(body) : {};
          if (!json || !json.ok || !json.data) return;
          var categories = json.data.categories || [];
          for (var i = 0; i < categories.length; i++) {
            _rememberPrepCategory(categories[i].categoryId, categories[i].categoryName || '');
          }
        });
    }

    function _prepInputRowHtml(label, field, value, hint) {
      return '<label class="kds-prep-settings-row">'
        + '<span class="kds-prep-settings-label">' + Utils.escapeHtml(label) + '</span>'
        + '<input class="kds-prep-settings-input" type="number" min="0" max="180" step="1" data-prep-field="' + Utils.escapeHtml(field) + '" value="' + Utils.escapeHtml(String(value)) + '">'
        + '<span class="kds-prep-settings-hint">' + Utils.escapeHtml(hint || '分前') + '</span>'
        + '</label>';
    }

    function _prepCategoryRowsHtml(cfg) {
      var ids = Object.keys(_prepCategoryMap).sort(function (a, b) {
        var na = _prepCategoryMap[a] || '';
        var nb = _prepCategoryMap[b] || '';
        return na > nb ? 1 : (na < nb ? -1 : 0);
      });
      if (ids.length === 0) {
        return '<div class="kds-prep-settings-empty">カテゴリ未取得</div>';
      }
      var html = '';
      for (var i = 0; i < ids.length; i++) {
        var catId = ids[i];
        var hasValue = Object.prototype.hasOwnProperty.call(cfg.categories || {}, catId);
        var value = hasValue ? cfg.categories[catId] : '';
        html += '<label class="kds-prep-settings-row">'
          + '<span class="kds-prep-settings-label">' + Utils.escapeHtml(_prepCategoryMap[catId] || 'カテゴリ') + '</span>'
          + '<input class="kds-prep-settings-input" type="number" min="0" max="180" step="1" data-prep-cat-id="' + Utils.escapeHtml(catId) + '" value="' + Utils.escapeHtml(String(value)) + '" placeholder="既定">'
          + '<span class="kds-prep-settings-hint">分前</span>'
          + '</label>';
      }
      return html;
    }

    function _renderPrepSettingsOverlay(note) {
      if (!_prepSettingsOverlay) return;
      var cfg = _prepLeadConfig || _loadPrepLeadConfig();
      _prepSettingsOverlay.innerHTML = '<div class="kds-prep-settings-panel" role="dialog" aria-modal="true" aria-label="着手時間設定">'
        + '<div class="kds-prep-settings-header">'
        + '<div class="kds-prep-settings-title">着手時間</div>'
        + '<button type="button" class="kds-prep-settings-close" data-prep-close="1">閉じる</button>'
        + '</div>'
        + '<div class="kds-prep-settings-body">'
        + _prepInputRowHtml('全体', 'defaultMin', cfg.defaultMin, '分前')
        + _prepInputRowHtml('テイクアウト', 'takeoutMin', cfg.takeoutMin, '分前')
        + _prepInputRowHtml('予約', 'reservationMin', cfg.reservationMin, '分前')
        + '<div class="kds-prep-settings-section">カテゴリ別</div>'
        + _prepCategoryRowsHtml(cfg)
        + (note ? '<div class="kds-prep-settings-note">' + Utils.escapeHtml(note) + '</div>' : '')
        + '</div>'
        + '<div class="kds-prep-settings-actions">'
        + '<button type="button" class="kds-prep-settings-save" data-prep-save="1">保存</button>'
        + '</div>'
        + '</div>';
    }

    function _readPrepSettingsFromOverlay() {
      var cfg = _defaultPrepLeadConfig();
      var fields = _prepSettingsOverlay ? _prepSettingsOverlay.querySelectorAll('[data-prep-field]') : [];
      for (var i = 0; i < fields.length; i++) {
        var field = fields[i].getAttribute('data-prep-field');
        if (field === 'defaultMin' || field === 'takeoutMin' || field === 'reservationMin') {
          cfg[field] = _normalizePrepMin(fields[i].value, cfg[field]);
        }
      }
      var cats = _prepSettingsOverlay ? _prepSettingsOverlay.querySelectorAll('[data-prep-cat-id]') : [];
      for (var j = 0; j < cats.length; j++) {
        var catId = cats[j].getAttribute('data-prep-cat-id');
        var raw = cats[j].value;
        if (raw === '') continue;
        var min = _normalizePrepMin(raw, null);
        if (catId && min !== null) cfg.categories[catId] = min;
      }
      return cfg;
    }

    function _closePrepSettingsOverlay() {
      if (_prepSettingsOverlay && _prepSettingsOverlay.parentNode) {
        _prepSettingsOverlay.parentNode.removeChild(_prepSettingsOverlay);
      }
      _prepSettingsOverlay = null;
    }

    function _showPrepSettingsOverlay() {
      _loadPrepLeadConfig();
      _closePrepSettingsOverlay();
      _prepSettingsOverlay = document.createElement('div');
      _prepSettingsOverlay.className = 'kds-prep-settings-overlay';
      document.body.appendChild(_prepSettingsOverlay);
      _prepSettingsOverlay.addEventListener('click', function (e) {
        if (e.target.getAttribute('data-prep-close') === '1' || e.target === _prepSettingsOverlay) {
          _closePrepSettingsOverlay();
          return;
        }
        if (e.target.getAttribute('data-prep-save') === '1') {
          _savePrepLeadConfig(_readPrepSettingsFromOverlay());
          _renderPrepSettingsOverlay('保存しました');
        }
      });
      _renderPrepSettingsOverlay('カテゴリ確認中');
      _fetchPrepCategories()
        .then(function () { _renderPrepSettingsOverlay(''); })
        .catch(function () { _renderPrepSettingsOverlay('カテゴリ取得失敗'); });
    }

    function _parseIsoTime(value) {
      if (!value) return 0;
      var t = Date.parse(value);
      return isNaN(t) ? 0 : t;
    }

    function _formatAge(ts) {
      if (!ts) return '-';
      var sec = Math.max(0, Math.floor((Date.now() - ts) / 1000));
      if (sec < 60) return sec + '秒前';
      var min = Math.floor(sec / 60);
      if (min < 60) return min + '分前';
      return Math.floor(min / 60) + '時間前';
    }

    function _readVoiceDiag() {
      try {
        var raw = localStorage.getItem(_VOICE_DIAG_KEY);
        return raw ? JSON.parse(raw) : {};
      } catch (e) {
        return {};
      }
    }

    function updateTerminalStatus() {
      var el = document.getElementById('kds-terminal-status');
      if (!el) return;
      var ageSec = _lastPollingAt ? Math.floor((Date.now() - _lastPollingAt) / 1000) : null;
      var stale = false;
      if (typeof OfflineStateBanner !== 'undefined' && OfflineStateBanner.isStale) {
        try { stale = OfflineStateBanner.isStale(); } catch (e) { stale = false; }
      }
      var level = 'ok';
      if (_lastPollingError || stale || ageSec === null || ageSec > 20) level = 'danger';
      else if (ageSec > 10) level = 'warn';

      var diag = _readVoiceDiag();
      var voiceSuccessAt = _parseIsoTime(diag.lastSuccessAt);
      var pollText = ageSec === null ? '最終更新 -' : '最終更新 ' + _formatAge(_lastPollingAt);
      var delayText = ageSec === null ? '遅延 -' : '遅延 ' + ageSec + '秒';
      var staleText = stale ? 'stale' : 'live';
      var voiceText = voiceSuccessAt ? ('音声成功 ' + _formatAge(voiceSuccessAt)) : '音声成功 -';
      var errorText = _lastPollingError ? ('通信異常 ' + _lastPollingError) : '';

      el.className = 'kds-terminal-status kds-terminal-status--' + level;
      el.innerHTML = '<span class="kds-terminal-status__pill">' + Utils.escapeHtml(pollText) + '</span>'
        + '<span class="kds-terminal-status__pill">' + Utils.escapeHtml(delayText) + '</span>'
        + '<span class="kds-terminal-status__pill">' + Utils.escapeHtml(staleText) + '</span>'
        + '<span class="kds-terminal-status__pill">' + Utils.escapeHtml(voiceText) + '</span>'
        + (errorText ? '<span class="kds-terminal-status__error">' + Utils.escapeHtml(errorText) + '</span>' : '');
    }

    function startTerminalStatusMonitor() {
      if (_terminalStatusTimer) {
        clearInterval(_terminalStatusTimer);
        _terminalStatusTimer = null;
      }
      updateTerminalStatus();
      _terminalStatusTimer = setInterval(updateTerminalStatus, 1000);
    }

    function _stopPreflightMic() {
      if (_preflightMicRaf) {
        cancelAnimationFrame(_preflightMicRaf);
        _preflightMicRaf = null;
      }
      if (_preflightMicStream) {
        var tracks = _preflightMicStream.getTracks();
        for (var i = 0; i < tracks.length; i++) {
          try { tracks[i].stop(); } catch (e) {}
        }
        _preflightMicStream = null;
      }
      if (_preflightMicCtx) {
        try { _preflightMicCtx.close(); } catch (ex) {}
        _preflightMicCtx = null;
      }
    }

    function _preflightRowsHtml() {
      var rows = [
        ['orders', 'KDS通信'],
        ['polling', '自動更新'],
        ['sound', '通知音'],
        ['mic', 'マイク'],
        ['wake', '画面維持'],
        ['station', 'ステーション']
      ];
      var html = '';
      for (var i = 0; i < rows.length; i++) {
        html += '<div class="kds-preflight-row" data-preflight-row="' + rows[i][0] + '">'
          + '<div class="kds-preflight-label">' + Utils.escapeHtml(rows[i][1]) + '</div>'
          + '<div class="kds-preflight-state" data-preflight-state="' + rows[i][0] + '">待機</div>'
          + '<div class="kds-preflight-detail" data-preflight-detail="' + rows[i][0] + '">-</div>'
          + '</div>';
      }
      return html;
    }

    function _setPreflightRow(id, state, detail) {
      var stateEl = document.querySelector('[data-preflight-state="' + id + '"]');
      var detailEl = document.querySelector('[data-preflight-detail="' + id + '"]');
      if (stateEl) {
        stateEl.className = 'kds-preflight-state kds-preflight-state--' + state;
        stateEl.textContent = state === 'ok' ? 'OK' : (state === 'warn' ? '確認' : (state === 'ng' ? 'NG' : '確認中'));
      }
      if (detailEl) detailEl.textContent = detail || '-';
    }

    function _setPreflightMicMeter(level, text) {
      var detailEl = document.querySelector('[data-preflight-detail="mic"]');
      if (!detailEl) return;
      var pct = Math.max(0, Math.min(100, Math.round((level || 0) * 100)));
      detailEl.innerHTML = Utils.escapeHtml(text || '') + '<div class="kds-preflight-meter"><div class="kds-preflight-meter__fill" style="width:' + pct + '%"></div></div>';
    }

    function _showPreflightOverlay() {
      _stopPreflightMic();
      if (_preflightOverlay && _preflightOverlay.parentNode) {
        _preflightOverlay.parentNode.removeChild(_preflightOverlay);
      }
      _preflightOverlay = document.createElement('div');
      _preflightOverlay.className = 'kds-preflight-overlay';
      _preflightOverlay.innerHTML = '<div class="kds-preflight-panel" role="dialog" aria-modal="true" aria-label="開店前チェック">'
        + '<div class="kds-preflight-header">'
        + '<div class="kds-preflight-title">開店前チェック</div>'
        + '<button type="button" class="kds-preflight-close" data-preflight-close="1">閉じる</button>'
        + '</div>'
        + '<div class="kds-preflight-body">' + _preflightRowsHtml() + '</div>'
        + '<div class="kds-preflight-actions">'
        + '<button type="button" class="kds-preflight-run" data-preflight-run="1">再チェック</button>'
        + '</div>'
        + '</div>';
      document.body.appendChild(_preflightOverlay);
      _preflightOverlay.addEventListener('click', function (e) {
        if (e.target.getAttribute('data-preflight-close') === '1' || e.target === _preflightOverlay) {
          _stopPreflightMic();
          if (_preflightOverlay && _preflightOverlay.parentNode) _preflightOverlay.parentNode.removeChild(_preflightOverlay);
          _preflightOverlay = null;
          return;
        }
        if (e.target.getAttribute('data-preflight-run') === '1') {
          _runPreflight();
        }
      });
      _runPreflight();
    }

    function _checkPreflightOrders() {
      var storeId = (typeof KdsAuth !== 'undefined' && KdsAuth.getStoreId) ? KdsAuth.getStoreId() : '';
      if (!storeId) {
        _setPreflightRow('orders', 'ng', '店舗未選択');
        return Promise.resolve();
      }
      _setPreflightRow('orders', 'run', 'KDS注文APIを確認中');
      var url = '../../api/kds/orders.php?store_id=' + encodeURIComponent(storeId);
      if (_stationId) url += '&station_id=' + encodeURIComponent(_stationId);
      return fetch(url, { credentials: 'same-origin' })
        .then(function (res) { return res.text(); })
        .then(function (body) {
          var json = body ? JSON.parse(body) : {};
          if (json && json.ok) {
            var count = json.data && json.data.orders ? json.data.orders.length : 0;
            _setPreflightRow('orders', 'ok', '取得OK / 注文' + count + '件');
          } else {
            _setPreflightRow('orders', 'ng', (json.error && json.error.message) || '取得失敗');
          }
        })
        .catch(function () {
          _setPreflightRow('orders', 'ng', '通信失敗');
        });
    }

    function _checkPreflightPolling() {
      var age = _lastPollingAt ? Math.floor((Date.now() - _lastPollingAt) / 1000) : null;
      if (_lastPollingError) {
        _setPreflightRow('polling', 'ng', _lastPollingError);
      } else if (age !== null && age <= 10) {
        _setPreflightRow('polling', 'ok', '最終更新' + age + '秒前');
      } else if (age !== null) {
        _setPreflightRow('polling', 'warn', '最終更新' + age + '秒前');
      } else {
        _setPreflightRow('polling', 'warn', 'まだ自動更新前');
      }
    }

    function _checkPreflightSound() {
      _setPreflightRow('sound', 'run', 'テスト音を再生');
      var ctx = _unlockStationAudio();
      _playStationTone('ready');
      if (ctx) {
        _setPreflightRow('sound', 'ok', '再生要求OK / ' + ctx.state);
      } else {
        _setPreflightRow('sound', 'warn', 'AudioContext未対応');
      }
    }

    function _checkPreflightWakeLock() {
      _setPreflightRow('wake', 'run', '画面維持を確認中');
      if (typeof WakeLockHelper === 'undefined' || !WakeLockHelper.isSupported || !WakeLockHelper.isSupported()) {
        _setPreflightRow('wake', 'warn', '端末またはブラウザ未対応');
        return;
      }
      WakeLockHelper.acquire();
      setTimeout(function () {
        var el = document.getElementById('kds-wake-lock-status');
        var state = el ? (el.getAttribute('data-wake-lock') || '') : '';
        if (state === 'active') {
          _setPreflightRow('wake', 'ok', '有効');
        } else {
          _setPreflightRow('wake', 'warn', state ? ('状態: ' + state) : '端末設定を確認');
        }
      }, 600);
    }

    function _checkPreflightStation() {
      var summary = _lastStationSummary;
      var label = (typeof getStationLabel === 'function') ? getStationLabel() : (_stationId ? '選択ステーション' : '全品目');
      var detail = label;
      if (summary) {
        detail += ' / 注文' + summary.orders + ' / 提供待ち' + summary.ready;
      }
      _setPreflightRow('station', 'ok', detail);
    }

    function _checkPreflightMic() {
      _stopPreflightMic();
      if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
        _setPreflightRow('mic', 'warn', 'ブラウザ未対応');
        return Promise.resolve();
      }
      _setPreflightRow('mic', 'run', '測定中');
      _setPreflightMicMeter(0, '測定中');
      return navigator.mediaDevices.getUserMedia({ audio: true }).then(function (stream) {
        _preflightMicStream = stream;
        var Ctx = window.AudioContext || window.webkitAudioContext;
        if (!Ctx) {
          _setPreflightRow('mic', 'warn', 'AudioContext未対応');
          _stopPreflightMic();
          return;
        }
        _preflightMicCtx = new Ctx();
        if (_preflightMicCtx.state === 'suspended') {
          try { _preflightMicCtx.resume(); } catch (e) {}
        }
        var source = _preflightMicCtx.createMediaStreamSource(stream);
        var analyser = _preflightMicCtx.createAnalyser();
        analyser.fftSize = 1024;
        source.connect(analyser);
        var data = new Uint8Array(analyser.fftSize);
        var peak = 0;
        var startedAt = Date.now();
        return new Promise(function (resolve) {
          function tick() {
            analyser.getByteTimeDomainData(data);
            var sum = 0;
            for (var i = 0; i < data.length; i++) {
              var v = (data[i] - 128) / 128;
              sum += v * v;
            }
            var rms = Math.sqrt(sum / data.length);
            var level = Math.max(0, Math.min(1, rms * 8));
            if (level > peak) peak = level;
            _setPreflightMicMeter(level, '最大' + Math.round(peak * 100) + '%');
            if (Date.now() - startedAt >= 2200) {
              _stopPreflightMic();
              if (peak >= 0.06) {
                _setPreflightRow('mic', 'ok', '入力あり / 最大' + Math.round(peak * 100) + '%');
              } else {
                _setPreflightRow('mic', 'warn', '入力小 / 最大' + Math.round(peak * 100) + '%');
              }
              resolve();
              return;
            }
            _preflightMicRaf = requestAnimationFrame(tick);
          }
          tick();
        });
      }).catch(function () {
        _setPreflightRow('mic', 'ng', 'マイク取得不可');
      });
    }

    function _runPreflight() {
      _setPreflightRow('orders', 'run', '確認中');
      _setPreflightRow('polling', 'run', '確認中');
      _setPreflightRow('sound', 'run', '確認中');
      _setPreflightRow('mic', 'run', '確認中');
      _setPreflightRow('wake', 'run', '確認中');
      _setPreflightRow('station', 'run', '確認中');
      _checkPreflightPolling();
      _checkPreflightSound();
      _checkPreflightWakeLock();
      _checkPreflightStation();
      _checkPreflightOrders();
      _checkPreflightMic();
    }

    function showStoreOverlay(stores, onSelect) {
      var overlay = document.getElementById('kds-store-overlay');
      var list = document.getElementById('kds-store-list');
      var html = '';
      stores.forEach(function (s) {
        html += '<button class="kds-store-overlay__btn" data-store-id="' + s.id + '">' + Utils.escapeHtml(s.name) + '</button>';
      });
      list.innerHTML = html;
      overlay.style.display = 'flex';

      list.addEventListener('click', function handler(e) {
        var btn = e.target.closest('.kds-store-overlay__btn');
        if (!btn) return;
        list.removeEventListener('click', handler);
        overlay.style.display = 'none';
        onSelect(btn.dataset.storeId);
      });
    }

    function findStore(stores, storeId) {
      for (var i = 0; i < stores.length; i++) {
        if (stores[i].id === storeId) return stores[i];
      }
      return null;
    }

    // Phase 1 (修正版): Wake Lock 取得を共通化。
    //   3 経路で呼ぶ:
    //     1. 起動オーバーレイの「KDSを開始」ボタン押下 (user gesture あり: 成功率高)
    //     2. 複数店舗の店舗選択クリック (user gesture あり: 成功率高)
    //     3. mt_kds_started 済でオーバーレイをスキップする経路 (user gesture なし: 失敗する可能性あり)
    //   → 失敗時 (state='blocked') のリカバリは _setupWakeLockRecovery() でステータス要素クリックを使う
    function _tryAcquireWakeLock() {
      if (typeof WakeLockHelper !== 'undefined') {
        WakeLockHelper.acquire();
      }
    }

    // ステータス表示要素をクリック可能にして、Wake Lock が取得できなかったときに
    // 現場スタッフが手動でリカバリできるようにする。
    function _setupWakeLockRecovery() {
      var statusEl = document.getElementById('kds-wake-lock-status');
      if (!statusEl) return;
      statusEl.style.cursor = 'pointer';
      statusEl.title = '画面が暗くならないようにする補助機能。タップで再取得を試します。';
      statusEl.addEventListener('click', _tryAcquireWakeLock);
    }

    // ── 起動オーバーレイ（オーディオ解禁用・セッション初回のみ表示） ──
    function showStartupOverlay(storeName, callback) {
      // 同一セッション内の2回目以降（ページ遷移して戻った場合）はスキップ
      if (sessionStorage.getItem('mt_kds_started')) {
        // 経路 3: ユーザー操作なしで自動取得を試す。失敗時はステータス要素クリックで復旧
        _tryAcquireWakeLock();
        _unlockStationAudio();
        callback();
        return;
      }
      var overlay = document.getElementById('kds-startup-overlay');
      var storeEl = document.getElementById('kds-startup-store');
      if (storeName) storeEl.textContent = storeName;
      overlay.style.display = 'flex';
      document.getElementById('kds-startup-btn').addEventListener('click', function () {
        VoiceCommander.unlockAudio();
        _unlockStationAudio();
        // 経路 1: 起動ボタン (user gesture あり)
        _tryAcquireWakeLock();
        sessionStorage.setItem('mt_kds_started', '1');
        overlay.style.display = 'none';
        callback();
      });
    }

    KdsAuth.init().catch(function () {}).then(function (ctx) {
      if (!ctx) return;
      document.getElementById('kds-user-name').textContent = ctx.user.displayName || ctx.user.email;

      // 店舗名テキスト表示
      var storeNameEl = document.getElementById('kds-store-name');
      var changeLinkEl = document.getElementById('kds-change-store');
      var currentStore = findStore(ctx.stores, ctx.storeId);
      if (currentStore) storeNameEl.textContent = currentStore.name;

      // 複数店舗: オーバーレイまたは切替リンク
      if (ctx.stores.length > 1) {
        var savedStore = localStorage.getItem('mt_kds_store');
        if (!savedStore || !ctx.stores.some(function (s) { return s.id === savedStore; })) {
          // 初回: オーバーレイで選択を強制（クリックでオーディオも解禁）
          showStoreOverlay(ctx.stores, function (selectedId) {
            VoiceCommander.unlockAudio();
            _unlockStationAudio();
            // 経路 2: 店舗選択クリック (user gesture あり)
            _tryAcquireWakeLock();
            KdsAuth.setStore(selectedId);
            var s = findStore(ctx.stores, selectedId);
            storeNameEl.textContent = s ? s.name : '-';
            changeLinkEl.style.display = '';
            sessionStorage.setItem('mt_kds_started', '1');
            // GPS チェック後に initMain
            KdsAuth.checkGps(selectedId, initMain);
          });
          return;
        }
        // 2回目以降: 切替リンク表示
        changeLinkEl.style.display = '';
        changeLinkEl.addEventListener('click', function (e) {
          e.preventDefault();
          showStoreOverlay(ctx.stores, function (selectedId) {
            VoiceCommander.unlockAudio();
            _unlockStationAudio();
            // 経路 2: 店舗切替クリック (user gesture あり) — sentinel が release されている場合の再取得
            _tryAcquireWakeLock();
            KdsAuth.setStore(selectedId);
            var s = findStore(ctx.stores, selectedId);
            storeNameEl.textContent = s ? s.name : '-';
            // GPS チェック後に再開
            KdsAuth.checkGps(selectedId, function () {
              VoiceCommander.onStoreChange();
              restartPolling();
            });
          });
        });
      }

      // 起動オーバーレイ → GPS チェック → initMain
      showStartupOverlay(currentStore ? currentStore.name : '', function () {
        KdsAuth.checkGps(ctx.storeId, initMain);
      });

      // ── メイン初期化 ──
      function initMain() {
        _stationId = localStorage.getItem('mt_kds_station') || '';
        if (_stationId === '__cashier__') {
          _stationId = '';
          localStorage.removeItem('mt_kds_station');
        }
        renderStationButtons([]);
        renderStationFocusLoading();
        var preflightBtn = document.getElementById('kds-preflight-btn');
        if (preflightBtn) {
          preflightBtn.addEventListener('click', function () {
            _showPreflightOverlay();
          });
        }
        var prepLeadBtn = document.getElementById('kds-prep-lead-btn');
        if (prepLeadBtn) {
          prepLeadBtn.addEventListener('click', function () {
            _showPrepSettingsOverlay();
          });
        }

        // ステーションバーのクリック
        document.getElementById('kds-station-bar').addEventListener('click', function (e) {
          var btn = e.target.closest('.kds-station-btn');
          if (!btn) return;
          _stationId = btn.dataset.station;
          if (_stationId) localStorage.setItem('mt_kds_station', _stationId);
          else localStorage.removeItem('mt_kds_station');

          var btns = document.querySelectorAll('.kds-station-btn');
          for (var i = 0; i < btns.length; i++) {
            btns[i].classList.toggle('active', btns[i].dataset.station === _stationId);
          }

          _stationSoundSnapshot[_stationKey()] = null;
          renderStationFocusLoading();
          restartPolling();
        });

        KdsRenderer.init(
          document.getElementById('col-pending'),
          document.getElementById('col-preparing'),
          document.getElementById('col-ready')
        );
        // KDS-P1-1: expeditor モード用コンテナを登録
        KdsRenderer.initExpeditor(document.getElementById('col-expeditor'));
        _loadPrepLeadConfig();
        _applyPrepLeadConfig();

        // KDS-P1-1: 表示モード切替 (localStorage で保持)
        (function () {
          var savedMode = 'normal';
          try {
            var v = localStorage.getItem('kds_view_mode');
            if (v === 'expeditor' || v === 'normal') savedMode = v;
          } catch (e) { /* noop */ }
          applyMode(savedMode);

          var modeBar = document.getElementById('kds-mode-bar');
          if (modeBar) {
            modeBar.addEventListener('click', function (e) {
              var btn = e.target.closest('[data-kds-mode]');
              if (!btn) return;
              var mode = btn.getAttribute('data-kds-mode');
              if (mode !== 'normal' && mode !== 'expeditor') return;
              try { localStorage.setItem('kds_view_mode', mode); } catch (ex) { /* noop */ }
              applyMode(mode);
            });
          }

          function applyMode(mode) {
            // ボタン active 切替
            var btns = document.querySelectorAll('[data-kds-mode]');
            for (var i = 0; i < btns.length; i++) {
              btns[i].className = btns[i].getAttribute('data-kds-mode') === mode
                ? 'kds-mode-btn active'
                : 'kds-mode-btn';
            }
            // 表示切替
            var normals = document.querySelectorAll('[data-kds-normal]');
            for (var j = 0; j < normals.length; j++) {
              normals[j].style.display = (mode === 'expeditor') ? 'none' : '';
            }
            var exps = document.querySelectorAll('[data-kds-expeditor]');
            for (var k = 0; k < exps.length; k++) {
              exps[k].style.display = (mode === 'expeditor') ? '' : 'none';
            }
            KdsRenderer.setMode(mode);
          }
        })();

        VoiceCommander.init();
        startTerminalStatusMonitor();
        startPolling();

        document.addEventListener('click', function (e) {
          var undoBtn = e.target.closest('[data-kds-undo-action]');
          if (undoBtn) {
            e.preventDefault();
            e.stopPropagation();
            KdsRenderer.undoLastAction(KdsAuth.getStoreId())
              .catch(function () { /* expired/offline/api error */ });
            return;
          }
          var servedUndoBtn = e.target.closest('.kds-served-undo__btn');
          if (servedUndoBtn) {
            e.preventDefault();
            e.stopPropagation();
            KdsRenderer.handleItemAction(servedUndoBtn.dataset.itemId, servedUndoBtn.dataset.itemStatus, KdsAuth.getStoreId())
              .catch(function () { /* offline/stale or api error */ });
          }
        });

        // カンバンのアクションボタン
        document.getElementById('kds-board').addEventListener('click', function (e) {
          // 品目単位のアクションボタン
          var itemBtn = e.target.closest('.kds-item-action');
          if (itemBtn) {
            // Phase 3: offline/stale 時に reject されるので unhandled rejection を避けるため握りつぶす
            KdsRenderer.handleItemAction(itemBtn.dataset.itemId, itemBtn.dataset.itemStatus, KdsAuth.getStoreId())
              .catch(function () { /* offline/stale or api error */ });
            return;
          }
          // 注文単位のアクションボタン
          var btn = e.target.closest('.kds-card__action') || e.target.closest('.kds-card__cancel');
          if (!btn) return;
          var reason = null;
          if (btn.dataset.status === 'cancelled') {
            if (!confirm('この注文をキャンセルしますか？')) return;
            reason = prompt('キャンセル理由を入力してください', '');
            if (!reason || !reason.trim()) return;
          }
          KdsRenderer.handleAction(btn.dataset.order, btn.dataset.status, KdsAuth.getStoreId(), reason)
            .catch(function () { /* offline/stale or api error */ });
        });

        // コースフェーズバー
        document.getElementById('kds-course-bar').addEventListener('click', function (e) {
          var btn = e.target.closest('.kds-advance-btn');
          if (!btn) return;
          var tableId = btn.dataset.tableId;
          if (!confirm('次のフェーズに進みますか？（現フェーズの未完了品目は全て提供済みになります）')) return;
          btn.disabled = true;
          btn.textContent = '処理中...';
          KdsRenderer.advancePhase(KdsAuth.getStoreId(), tableId)
            .then(function (json) {
              if (json && json.ok && json.data) {
                var msg = json.data.completed ? 'コース完了' : json.data.message;
                btn.textContent = msg || '完了';
              } else {
                btn.textContent = (window.Utils && Utils.formatError) ? Utils.formatError(json) : ((json && json.error && json.error.message) || 'エラー');
              }
              setTimeout(function () { btn.disabled = false; }, 1000);
            })
            .catch(function () {
              // Phase 3: offline/stale では reject。ボタンを戻して握りつぶす
              btn.textContent = '\u901A\u4FE1\u4E0D\u5B89\u5B9A';
              setTimeout(function () { btn.disabled = false; }, 1500);
            });
        });
      }

      // ── ポーリング制御 ──
      function startPolling() {
        var storeId = KdsAuth.getStoreId();
        var sid = _stationId === '__cashier__' ? '' : _stationId;
        PollingDataSource.start(storeId, function (data) {
          clearError();
          _lastPollingAt = Date.now();
          _lastPollingError = '';
          if (data.stations) renderStationButtons(data.stations);
          _collectPrepCategoriesFromOrders(data.orders || []);
          KdsRenderer.onData(data);
          updateStationFocus(false);
          updateTerminalStatus();
          VoiceCommander.updateOrders(data.orders || []);
          if (window.AiKitchen) AiKitchen.onPollingData(data);
          updateCourseBar();
        }, handleError, sid);
      }

      function restartPolling() {
        PollingDataSource.stop();
        startPolling();
      }

      function updateCourseBar() {
        var bar = document.getElementById('kds-course-bar');
        var courseTables = KdsRenderer.getCourseTableIds();
        if (courseTables.length === 0) { bar.innerHTML = ''; return; }
        bar.innerHTML = courseTables.map(function (ct) {
          return '<button class="kds-advance-btn" data-table-id="' + ct.tableId + '">'
            + Utils.escapeHtml(ct.tableCode) + ' ' + Utils.escapeHtml(ct.courseName)
            + ' P' + ct.currentPhase + ' → 次フェーズ</button>';
        }).join('');
      }

      // ── ステーションボタン描画 ──
      function renderStationButtons(stations) {
        var bar = document.getElementById('kds-station-bar');
        var html = '<button class="kds-station-btn' + (_stationId === '' ? ' active' : '') + '" data-station="" data-station-name="全品目">全品目</button>';
        (stations || []).forEach(function (st) {
          var id = st.id || '';
          var name = st.name || '';
          html += '<button class="kds-station-btn' + (_stationId === id ? ' active' : '') + '" data-station="' + Utils.escapeHtml(id) + '" data-station-name="' + Utils.escapeHtml(name) + '">' + Utils.escapeHtml(name) + '</button>';
        });
        bar.innerHTML = html;
      }

      function getStationLabel() {
        var active = document.querySelector('.kds-station-btn.active');
        if (active && active.getAttribute('data-station-name')) {
          return active.getAttribute('data-station-name');
        }
        return _stationId ? '選択ステーション' : '全品目';
      }

      function clearStationButtonLevels() {
        var btns = document.querySelectorAll('.kds-station-btn');
        for (var i = 0; i < btns.length; i++) {
          btns[i].classList.remove('kds-station-btn--prep');
          btns[i].classList.remove('kds-station-btn--warning');
          btns[i].classList.remove('kds-station-btn--danger');
        }
      }

      function applyStationButtonLevel(level) {
        clearStationButtonLevels();
        if (level !== 'prep' && level !== 'warning' && level !== 'danger') return;
        var active = document.querySelector('.kds-station-btn.active');
        if (active) active.classList.add('kds-station-btn--' + level);
      }

      function renderStationFocusLoading() {
        var el = document.getElementById('kds-station-focus');
        if (!el) return;
        clearStationButtonLevels();
        el.className = 'kds-station-focus';
        el.innerHTML = '<span class="kds-station-focus__name">' + Utils.escapeHtml(getStationLabel()) + '</span>'
          + '<span class="kds-station-focus__metric">読込中</span>';
      }

      function stationLevelText(summary) {
        if (!summary) return '通常';
        if (summary.danger > 0) return '赤 ' + summary.danger;
        if (summary.warning > 0) return '黄 ' + summary.warning;
        if (summary.prep > 0) return '事前 ' + summary.prep;
        if (summary.ready > 0) return '提供待ち ' + summary.ready;
        return '通常';
      }

      function maybePlayStationSound(summary, skipSound) {
        var key = _stationKey();
        var current = {
          ready: summary.ready || 0,
          prep: summary.prep || 0,
          warning: summary.warning || 0,
          danger: summary.danger || 0
        };
        var prev = _stationSoundSnapshot[key];
        if (!skipSound && prev) {
          if (current.danger > prev.danger) {
            _playStationTone('danger');
          } else if (current.warning > prev.warning) {
            _playStationTone('warning');
          } else if (current.ready > prev.ready) {
            _playStationTone('ready');
          } else if (current.prep > prev.prep) {
            _playStationTone('prep');
          }
        }
        _stationSoundSnapshot[key] = current;
      }

      function updateStationFocus(skipSound) {
        var el = document.getElementById('kds-station-focus');
        if (!el || !KdsRenderer.getOperationalSummary) return;
        var summary = KdsRenderer.getOperationalSummary();
        _lastStationSummary = summary;
        var level = summary.topLevel || 'normal';
        var label = getStationLabel();
        applyStationButtonLevel(level);
        el.className = 'kds-station-focus kds-station-focus--' + level;
        el.innerHTML = '<span class="kds-station-focus__name">' + Utils.escapeHtml(label) + '</span>'
          + '<span class="kds-station-focus__status">' + Utils.escapeHtml(stationLevelText(summary)) + '</span>'
          + '<span class="kds-station-focus__metric">注文' + summary.orders + '</span>'
          + '<span class="kds-station-focus__metric">品目' + summary.active + '</span>'
          + '<span class="kds-station-focus__metric">受付' + summary.pending + '</span>'
          + '<span class="kds-station-focus__metric">調理' + summary.preparing + '</span>'
          + '<span class="kds-station-focus__metric">提供待ち' + summary.ready + '</span>'
          + (summary.topReason ? '<span class="kds-station-focus__reason">' + Utils.escapeHtml(summary.topReason) + '</span>' : '');
        maybePlayStationSound(summary, skipSound);
      }

      function handleError(errMsg) {
        console.error('KDS polling error:', errMsg);
        _lastPollingError = errMsg || 'polling error';
        updateTerminalStatus();
        var errEl = document.getElementById('kds-error');
        if (!errEl) {
          errEl = document.createElement('div');
          errEl.id = 'kds-error';
          errEl.style.cssText = 'background:#d32f2f;color:#fff;padding:0.5rem 1rem;text-align:center;font-size:0.875rem;';
          document.querySelector('.kds-header').after(errEl);
        }
        errEl.textContent = 'エラー: ' + errMsg;
        errEl.style.display = '';
      }

      function clearError() {
        var errEl = document.getElementById('kds-error');
        if (errEl) errEl.style.display = 'none';
      }
    });

    // ログアウト
    document.getElementById('btn-kds-logout').addEventListener('click', function () {
      fetch('../../api/auth/logout.php', { method: 'DELETE', credentials: 'same-origin' })
        .finally(function () { window.location.href = '../admin/index.html'; });
    });
  })();
  </script>

  <script src="../shared/js/wake-lock-helper.js?v=20260420-pwa1b"></script>
  <script>
    (function () {
      'use strict';
      if (typeof WakeLockHelper === 'undefined') return;
      var statusEl = document.getElementById('kds-wake-lock-status');
      if (!statusEl) return;
      WakeLockHelper.attachStatusElement(statusEl);
      // Phase 1 (修正版): user gesture なしで Wake Lock 取得失敗するケースに備え、
      // ステータス要素をクリック可能にして手動再取得できるようにする
      statusEl.style.cursor = 'pointer';
      statusEl.title = '画面が暗くならないようにする補助機能。タップで再取得を試します。';
      statusEl.addEventListener('click', function () {
        WakeLockHelper.acquire();
      });
    })();

  <script>PWAUpdateManager.init({ scope: 'kds', cachePrefix: 'posla-kds-' });</script>
  <!-- Phase 2a: Web Push 購読 + バッジ管理 -->
  <script src="../shared/js/push-subscription-manager.js?v=20260420-pwa2b"></script>
  <script src="../shared/js/badge-manager.js?v=20260420-pwa2a"></script>
  <script>
    (function () {
      'use strict';
      // KDS の store_id は KdsAuth が解決するため、init は scope だけで開始し、
      // KdsAuth から storeId を取得できるようになり次第 setStoreId で反映する。
      // Phase 2b 修正: store_id 未紐付けでは push_send_to_store の WHERE に乗らないため必須化。
      PushSubscriptionManager.init({ scope: 'kds' });

      (function pollStoreId() {
        var s = (typeof KdsAuth !== 'undefined' && KdsAuth.getStoreId) ? KdsAuth.getStoreId() : null;
        if (s) {
          PushSubscriptionManager.setStoreId(s);
          return;
        }
        setTimeout(pollStoreId, 1000);
      })();

      // ヘッダの状態表示要素を attach (compact UI)
      var statusEl = document.getElementById('kds-push-status');
      // PWA インストール済のときだけ通知ステータスを表示する (PC ブラウザ等では非表示)
      var isStandalone = (window.matchMedia && window.matchMedia('(display-mode: standalone)').matches)
                      || (window.navigator && window.navigator.standalone === true);
      if (statusEl && !isStandalone) {
        statusEl.style.display = 'none';
        statusEl = null;   // 以下の処理もスキップ
      }
      if (statusEl) {
        // attachUI は別 div を append する設計なので、ここでは状態テキストを
        // 直接 statusEl に書き込む簡易バージョンを使う
        var labels = {
          'unsupported': '通知: 未対応',
          'no_vapid':    '通知: 未設定',
          'denied':      '通知: ブロック中',
          'default':     '通知: 未設定 (タップで許可)',
          'granted':     '通知: 許可済み',
          'subscribed':  '通知: 有効',
          'error':       '通知: エラー'
        };
        function refresh() {
          var s = PushSubscriptionManager.getState();
          statusEl.textContent = labels[s] || labels['default'];
        }
        // ポーリングで状態を反映 (PushSubscriptionManager は内部で _setState を持つが
        // 外部コールバック登録 API がない compact 用途なので 2 秒ごとに getState で十分)
        refresh();
        setInterval(refresh, 2000);
        statusEl.addEventListener('click', function () {
          PushSubscriptionManager.requestPermission();
        });
      }

      // バッジ更新: KDS 呼び出しアラート件数 (KdsAlert の内部状態を読まず DOM から数える)
      // 既存ポーリング (5 秒) が DOM を更新するので、5 秒ごとに DOM をスキャン
      function updateBadge() {
        if (typeof BadgeManager === 'undefined') return;
        var items = document.querySelectorAll('.kds-call-item');
        BadgeManager.set(items.length);
      }
      setInterval(updateBadge, 5000);
      updateBadge();
    })();
  </script>
