<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#ff6f00">
  <title>セルフオーダー</title>
  <link rel="stylesheet" href="css/customer.css?v=20260422-batch-e3c">
  <style>
    .plan-banner { background:linear-gradient(135deg,#ff6f00,#ff8f00); color:#fff; padding:0.5rem 1rem; text-align:center; font-size:0.875rem; }
    .plan-banner__name { font-weight:700; }
    .plan-banner__time { font-size:0.8rem; margin-top:2px; }
    .plan-banner__time--warning { color:#fff3cd; animation:pulse-warn 1s infinite; }
    .plan-banner__time--ended { color:#ffcdd2; font-weight:700; }
    @keyframes pulse-warn { 0%,100%{opacity:1} 50%{opacity:0.6} }
    .menu-item__price--plan { color:#ff6f00; font-weight:700; }
    /* コースモード */
    .course-banner { background:linear-gradient(135deg,#2e7d32,#43a047); color:#fff; padding:0.75rem 1rem; text-align:center; }
    .course-banner__name { font-weight:700; font-size:1rem; }
    .course-banner__sub { font-size:0.8rem; margin-top:2px; opacity:0.9; }
    .course-phase { padding:0.75rem 1rem; border-bottom:1px solid #e0e0e0; }
    .course-phase--current { background:#e8f5e9; border-left:4px solid #2e7d32; }
    .course-phase--done { opacity:0.5; }
    .course-phase--future { opacity:0.7; }
    .course-phase__header { display:flex; align-items:center; gap:0.5rem; margin-bottom:0.5rem; }
    .course-phase__num { background:#2e7d32; color:#fff; width:1.5rem; height:1.5rem; border-radius:50%; display:flex; align-items:center; justify-content:center; font-size:0.75rem; font-weight:700; flex-shrink:0; }
    .course-phase--done .course-phase__num { background:#9e9e9e; }
    .course-phase__name { font-weight:700; font-size:0.95rem; }
    .course-phase__badge { font-size:0.7rem; padding:1px 6px; border-radius:8px; background:#c8e6c9; color:#2e7d32; }
    .course-phase--done .course-phase__badge { background:#e0e0e0; color:#757575; }
    .course-phase__items { list-style:none; margin:0; padding:0; }
    .course-phase__items li { padding:0.25rem 0 0.25rem 2rem; font-size:0.9rem; color:#333; }
    .course-phase__items li::before { content:''; display:inline-block; width:4px; height:4px; border-radius:50%; background:#2e7d32; margin-right:0.5rem; vertical-align:middle; }
    .course-phase--done .course-phase__items li { text-decoration:line-through; color:#999; }
    /* 前回の注文（再注文セクション） */
    .reorder-section { background:#fff8e1; border:1px solid #ffe0b2; border-radius:var(--radius); margin:0.75rem 0.75rem 0; padding:0.75rem; }
    .reorder-section__title { font-size:0.9375rem; font-weight:700; color:var(--orange-dark); margin-bottom:0.5rem; }
    .reorder-item { display:flex; align-items:center; padding:0.5rem 0; border-bottom:1px solid #ffe0b2; }
    .reorder-item:last-child { border-bottom:none; }
    .reorder-item__info { flex:1; min-width:0; }
    .reorder-item__name { font-size:0.875rem; font-weight:600; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
    .reorder-item__meta { font-size:0.75rem; color:var(--text-muted); }
    .reorder-item__add { background:var(--orange); color:#fff; border:none; border-radius:16px; padding:0.375rem 0.75rem; font-size:0.75rem; font-weight:600; cursor:pointer; white-space:nowrap; flex-shrink:0; margin-left:0.5rem; }
    .reorder-item__add:disabled { background:#bdbdbd; cursor:not-allowed; }
    /* ウェルカムモーダル */
    .welcome-overlay { position:fixed; inset:0; background:rgba(0,0,0,0.5); z-index:500; display:flex; align-items:center; justify-content:center; opacity:0; visibility:hidden; transition:opacity 0.3s, visibility 0.3s; }
    .welcome-overlay.open { opacity:1; visibility:visible; }
    .welcome-modal { background:#fff; border-radius:16px; padding:2rem 1.5rem; margin:1rem; max-width:340px; width:100%; text-align:center; transform:scale(0.9); transition:transform 0.3s; }
    .welcome-overlay.open .welcome-modal { transform:scale(1); }
    .welcome-modal__store { font-size:1.25rem; font-weight:700; color:var(--orange-dark); margin-bottom:0.75rem; }
    .welcome-modal__msg { font-size:0.9375rem; color:var(--text-primary); margin-bottom:0.75rem; line-height:1.6; }
    .welcome-modal__wait { font-size:0.8125rem; color:var(--orange); font-weight:600; margin-bottom:1rem; }
    .welcome-modal__btn { background:var(--orange); color:#fff; border:none; border-radius:8px; padding:0.75rem 2rem; font-size:1rem; font-weight:700; cursor:pointer; width:100%; }
    /* O-3: ラストオーダーバナー */
    .lo-banner { background:#d32f2f; color:#fff; padding:0.625rem 1rem; text-align:center; font-size:0.9375rem; font-weight:700; animation:pulse-warn 1.5s infinite; }
    /* N-3: メモ・アレルギー */
    .cart-modal__memo-section { padding:12px 16px; border-top:1px solid #333; }
    .cart-memo-label { display:block; font-size:0.85rem; color:#aaa; margin-bottom:6px; }
    .cart-memo-input { width:100%; background:#1a1a2e; border:1px solid #444; color:#fff; border-radius:8px; padding:8px 12px; font-size:0.9rem; resize:none; box-sizing:border-box; }
    .cart-memo-input::placeholder { color:#666; }
    .cart-allergen-section { margin-top:10px; }
    .allergen-chips { display:flex; flex-wrap:wrap; gap:6px; }
    .allergen-chip { display:inline-flex; align-items:center; gap:4px; padding:4px 10px; border:1px solid #555; border-radius:16px; font-size:0.8rem; color:#ccc; cursor:pointer; }
    .allergen-chip input { display:none; }
    .allergen-chip input:checked + span { color:#ff6b6b; font-weight:bold; }
    .allergen-chip:has(input:checked) { border-color:#ff6b6b; background:rgba(255,107,107,0.15); }
    /* N-1/N-6/N-7: バッジ・カロリー・アレルギー */
    .menu-item__badge { display:inline-block; padding:2px 8px; border-radius:10px; font-size:0.7rem; font-weight:bold; margin-left:6px; vertical-align:middle; }
    .badge-recommend { background:#ff6b35; color:#fff; }
    .badge-popular { background:#e91e63; color:#fff; }
    .badge-new { background:#4caf50; color:#fff; }
    .badge-limited { background:#9c27b0; color:#fff; }
    .badge-today { background:#f44336; color:#fff; animation:pulse-badge 2s infinite; }
    .badge-rank { background:transparent; font-size:1rem; padding:0 4px; }
    .badge-rank-top10 { background:#607d8b; color:#fff; font-size:0.7rem; }
    .menu-item__calories { font-size:0.75rem; color:#888; margin-right:8px; }
    .menu-item__allergens { display:flex; flex-wrap:wrap; gap:4px; margin-top:4px; }
    .allergen-tag { display:inline-block; padding:1px 6px; border:1px solid #ff9800; border-radius:8px; font-size:0.65rem; color:#ff9800; }
    .recommend-comment { font-size:0.8rem; color:#ff6b35; padding:0 1rem 0.5rem; margin-top:-0.25rem; font-style:italic; }
    .menu-section--recommend { background:linear-gradient(135deg,#fff8e1,#fff3e0); border-bottom:2px solid #ff6b35; }
    @keyframes pulse-badge { 0%,100%{opacity:1} 50%{opacity:0.6} }
    /* N-2: 注文追跡 */
    .order-status-section { padding:0 16px 12px; }
    .order-status-card { background:#16213e; border-radius:12px; padding:12px; margin-bottom:10px; }
    .order-status-card__header { display:flex; justify-content:space-between; margin-bottom:8px; font-size:0.85rem; color:#888; }
    .order-status-item { display:flex; justify-content:space-between; align-items:center; padding:6px 0; border-bottom:1px solid rgba(255,255,255,0.05); }
    .order-status-item__name { font-size:0.9rem; color:#e0e0e0; }
    .order-status-item__badge { padding:2px 10px; border-radius:10px; font-size:0.75rem; font-weight:bold; }
    .status-pending { background:#555; color:#ccc; }
    .status-preparing { background:#ff9800; color:#fff; animation:pulse 2s infinite; }
    .status-ready { background:#4caf50; color:#fff; animation:pulse 1.5s infinite; }
    .status-served { background:#2196f3; color:#fff; }
    .order-progress-bar { height:4px; background:#333; border-radius:2px; margin-top:8px; overflow:hidden; }
    .order-progress-bar__fill { height:100%; background:linear-gradient(90deg,#ff9800,#4caf50); transition:width 0.5s ease; }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.7} }
    /* N-4: 評価モーダル */
    .rating-overlay { position:fixed; inset:0; background:rgba(0,0,0,0.7); z-index:2000; display:none; align-items:center; justify-content:center; }
    .rating-overlay.open { display:flex; }
    .rating-modal { background:#1a1a2e; border-radius:16px; padding:24px; text-align:center; max-width:340px; width:90%; }
    .rating-modal__header { margin-bottom:16px; }
    .rating-modal__header span:first-child { display:block; font-size:1.1rem; color:#fff; font-weight:bold; }
    .rating-modal__sub { display:block; font-size:0.85rem; color:#aaa; margin-top:4px; }
    .rating-modal__faces { display:flex; justify-content:space-around; margin-bottom:16px; }
    .rating-face { background:none; border:2px solid transparent; border-radius:12px; padding:8px; font-size:2rem; cursor:pointer; color:#fff; transition:all 0.2s; }
    .rating-face span { display:block; font-size:0.65rem; margin-top:4px; }
    .rating-face:active, .rating-face:hover { border-color:#ff6b35; background:rgba(255,107,53,0.15); transform:scale(1.1); }
    .rating-skip { background:none; border:none; color:#666; font-size:0.85rem; cursor:pointer; padding:8px; }
    .rating-toast { position:fixed; bottom:80px; left:50%; transform:translateX(-50%) translateY(20px); background:#333; color:#fff; padding:10px 24px; border-radius:20px; font-size:0.9rem; opacity:0; transition:all 0.3s; z-index:3000; }
    .rating-toast.show { opacity:1; transform:translateX(-50%) translateY(0); }
    .rating-toast--review { text-align:center; padding:16px 20px; min-width:240px; }
    .customer-header__takeout { color:#fff; font-size:0.75rem; font-weight:600; text-decoration:none; padding:0.25rem 0.625rem; border:1.5px solid #fff; border-radius:1rem; white-space:nowrap; }
    /* L-4: 言語セレクター */
    .lang-selector { position:relative; display:inline-flex; align-items:center; gap:6px; }
    .lang-selector__btn { background:rgba(255,255,255,0.2); border:1.5px solid rgba(255,255,255,0.6); color:#fff; border-radius:1rem; padding:0.25rem 0.625rem; font-size:0.8125rem; font-weight:600; cursor:pointer; display:flex; align-items:center; gap:4px; white-space:nowrap; }
    .lang-selector__flag { font-size:1rem; line-height:1; }
    .lang-selector__code { font-size:0.75rem; }
    .lang-selector__dropdown { display:none; position:absolute; top:calc(100% + 6px); right:0; background:#fff; border-radius:12px; box-shadow:0 8px 24px rgba(0,0,0,0.2); z-index:600; min-width:160px; overflow:hidden; }
    .lang-selector__dropdown.open { display:block; }
    .lang-selector__option { display:flex; align-items:center; gap:8px; width:100%; padding:10px 16px; border:none; background:none; font-size:0.9rem; color:#333; cursor:pointer; text-align:left; }
    .lang-selector__option:hover, .lang-selector__option:active { background:#fff3e0; }
    .lang-selector__option.active { background:#ff6f00; color:#fff; font-weight:700; }
    .lang-selector__option span { font-size:1.125rem; }
    /* Batch-E-3 iPhone fix: customer-header が縦に膨張する問題を強制抑制 */
    .customer-header { flex-wrap: nowrap !important; flex-direction: row !important; height: 56px !important; min-height: 56px !important; max-height: 56px !important; overflow: hidden !important; padding: 0 16px !important; }
    .customer-header__info { display: inline-flex !important; align-items: center !important; gap: 6px !important; overflow: hidden !important; min-width: 0 !important; flex-shrink: 1 !important; flex-wrap: nowrap !important; }
    .customer-header__info > .customer-header__store { white-space: nowrap !important; overflow: hidden !important; text-overflow: ellipsis !important; max-width: 42vw !important; display: inline-block !important; margin-left: 0 !important; }
    .customer-header__info > .customer-header__table { white-space: nowrap !important; flex-shrink: 0 !important; display: inline-block !important; margin-left: 6px !important; }
    .customer-header__takeout { flex-shrink: 0 !important; white-space: nowrap !important; }
    .lang-selector { flex-shrink: 0 !important; }
    /* L-8: セルフレジ (Batch-E-3 で .action-bar 内配置に変更、position は外から上書き) */
    .checkout-bar { background:#2d7a4f; padding:10px 16px; text-align:center; display:none; }
    .checkout-bar__btn { background:#fff; color:#2d7a4f; border:none; border-radius:8px; padding:12px 40px; font-size:16px; font-weight:bold; cursor:pointer; width:100%; max-width:400px; }
    .checkout-bar__btn:active { opacity:0.8; }
    /* Batch-E-3: action-bar wrapper による新レイアウト (inline 版、外部 CSS キャッシュ対策で inline にも配置) */
    .action-bar { position:fixed; left:0; right:0; bottom:0; display:flex; flex-direction:row; align-items:stretch; z-index:200; box-shadow:0 -2px 12px rgba(0,0,0,0.14); background:transparent; pointer-events:none; }
    .action-bar > * { pointer-events:auto; }
    .action-bar > .cart-bar { position:static; z-index:auto; box-shadow:none; flex:1 1 auto; min-width:0; padding-bottom:calc(0.75rem + env(safe-area-inset-bottom, 0px)); bottom:auto; }
    .action-bar > .checkout-bar { position:static; flex:0 0 auto; display:flex; align-items:center; justify-content:center; padding-bottom:calc(10px + env(safe-area-inset-bottom, 0px)); box-shadow:none; }
    .action-bar > .cart-bar[style*="display:none"] + .checkout-bar,
    .action-bar > .cart-bar[style*="display: none"] + .checkout-bar { flex:1 1 auto; padding-left:32px; padding-right:32px; }
    /* max-width を 340px に抑えて緑の余白を左右に確保、ボタンの「強すぎる白」を抑制 */
    .action-bar > .cart-bar[style*="display:none"] + .checkout-bar .checkout-bar__btn,
    .action-bar > .cart-bar[style*="display: none"] + .checkout-bar .checkout-bar__btn { max-width:340px; width:100%; margin:0 auto; }
    body { padding-bottom:calc(80px + env(safe-area-inset-bottom, 0px)) !important; }
    .checkout-modal { position:fixed; inset:0; z-index:2100; display:none; }
    .checkout-modal.open { display:block; }
    .checkout-modal__overlay { position:absolute; inset:0; background:rgba(0,0,0,0.6); }
    .checkout-modal__content { position:absolute; bottom:0; left:0; right:0; background:#fff; border-radius:16px 16px 0 0; max-height:85vh; overflow-y:auto; }
    .checkout-modal__header { display:flex; justify-content:space-between; align-items:center; padding:16px 20px; border-bottom:1px solid #e0e0e0; }
    .checkout-modal__header h2 { margin:0; font-size:1.125rem; color:#333; }
    .checkout-modal__close { background:none; border:none; font-size:1.5rem; color:#999; cursor:pointer; padding:0 4px; }
    .checkout-modal__body { padding:16px 20px; }
    .checkout-order { margin-bottom:12px; }
    .checkout-order__item { display:flex; justify-content:space-between; align-items:baseline; padding:4px 0; font-size:0.9rem; color:#333; }
    .checkout-order__option { font-size:0.8rem; color:#888; padding-left:1rem; }
    .checkout-order__divider { border:none; border-top:1px solid #e0e0e0; margin:12px 0; }
    .checkout-summary { background:#f5f5f5; border-radius:8px; padding:12px 16px; margin-bottom:16px; }
    .checkout-summary__row { display:flex; justify-content:space-between; padding:3px 0; font-size:0.85rem; color:#666; }
    .checkout-summary__row--total { font-size:1.25rem; font-weight:bold; color:#333; padding-top:8px; border-top:2px solid #333; margin-top:8px; }
    .checkout-modal__pay-btn { display:block; width:100%; background:#2d7a4f; color:#fff; border:none; border-radius:8px; padding:14px; font-size:1.05rem; font-weight:bold; cursor:pointer; margin-bottom:8px; }
    .checkout-modal__pay-btn:disabled { background:#bdbdbd; cursor:not-allowed; }
    .checkout-modal__methods { margin-top:0.75rem; display:flex; flex-direction:column; align-items:center; gap:0.5rem; }
    .checkout-modal__methods-label { font-size:0.75rem; color:#666; letter-spacing:0.05em; }
    .checkout-modal__methods-list { display:flex; flex-wrap:wrap; justify-content:center; gap:0.4rem; }
    .checkout-modal__method-badge { display:inline-block; padding:0.25rem 0.5rem; font-size:0.7rem; font-weight:600; border:1px solid #d0d0d0; border-radius:4px; background:#fff; color:#333; letter-spacing:0.02em; line-height:1; white-space:nowrap; }
    .checkout-modal__method-badge--visa { color:#1a1f71; border-color:#1a1f71; }
    .checkout-modal__method-badge--master { color:#eb001b; border-color:#eb001b; }
    .checkout-modal__method-badge--jcb { color:#0e4c96; border-color:#0e4c96; }
    .checkout-modal__method-badge--amex { color:#2e77bc; border-color:#2e77bc; }
    .checkout-modal__method-badge--apple { color:#000; border-color:#000; }
    .checkout-modal__method-badge--google { color:#4285f4; border-color:#4285f4; }
    .checkout-modal__note { text-align:center; font-size:0.75rem; color:#999; margin:0 0 8px; }
    .checkout-done-modal { position:fixed; inset:0; z-index:2200; display:none; align-items:center; justify-content:center; }
    .checkout-done-modal.open { display:flex; }
    .checkout-done-modal__overlay { position:absolute; inset:0; background:rgba(0,0,0,0.7); }
    .checkout-done-modal__content { position:relative; background:#fff; border-radius:16px; padding:32px 24px; text-align:center; max-width:340px; width:90%; z-index:1; }
    .checkout-done-modal__icon { width:64px; height:64px; border-radius:50%; background:#2d7a4f; color:#fff; font-size:2rem; display:flex; align-items:center; justify-content:center; margin:0 auto 16px; }
    .checkout-done-modal__content h2 { margin:0 0 4px; font-size:1.25rem; color:#333; }
    .checkout-done-modal__content p { margin:0 0 12px; color:#666; font-size:0.9rem; }
    .checkout-done-modal__amount { font-size:2rem; font-weight:bold; color:#2d7a4f; margin-bottom:20px; }
    .checkout-done-modal__receipt-btn { background:#2d7a4f; color:#fff; border:none; border-radius:8px; padding:12px 32px; font-size:1rem; font-weight:bold; cursor:pointer; margin-bottom:12px; }
    .checkout-done-modal__receipt-btn:active { opacity:0.8; }
    .checkout-done-modal__note { font-size:0.75rem; color:#999; margin:0; }
    .checkout-done-modal__close-btn { background:none; border:1px solid #ccc; border-radius:8px; padding:8px 32px; font-size:0.9rem; color:#666; cursor:pointer; margin-top:16px; }
  </style>
</head>
<body>

  <!-- ヘッダー -->
  <header class="customer-header" id="customer-header">
    <div class="customer-header__info">
      <span class="customer-header__store" id="store-name">-</span>
      <span class="customer-header__table" id="table-name">-</span>
    </div>
    <a href="#" class="customer-header__takeout" id="btn-takeout" style="display:none">テイクアウト</a>
    <div class="lang-selector" id="lang-selector">
      <button class="lang-selector__btn" id="btn-lang">
        <span class="lang-selector__flag" id="lang-flag">🇯🇵</span>
        <span class="lang-selector__code" id="lang-code">JA</span>
      </button>
      <div class="lang-selector__dropdown" id="lang-dropdown">
        <button class="lang-selector__option" data-lang="ja"><span>🇯🇵</span> 日本語</button>
        <button class="lang-selector__option" data-lang="en"><span>🇺🇸</span> English</button>
        <button class="lang-selector__option" data-lang="zh-Hans"><span>🇨🇳</span> 简体中文</button>
        <button class="lang-selector__option" data-lang="ko"><span>🇰🇷</span> 한국어</button>
      </div>
    </div>
  </header>

  <!-- Batch-E-1: state-bar で plan / course / lo を 1 本の帯に集約 -->
  <div class="state-bar" id="state-bar">
    <!-- プランバナー（食べ放題時のみ表示） -->
    <div class="plan-banner" id="plan-banner" style="display:none">
      <div class="plan-banner__name" id="plan-banner-name"></div>
      <div class="plan-banner__time" id="plan-banner-time"></div>
    </div>

    <!-- コースバナー（コース時のみ表示） -->
    <div class="course-banner" id="course-banner" style="display:none">
      <div class="course-banner__name" id="course-banner-name"></div>
      <div class="course-banner__sub" id="course-banner-sub"></div>
    </div>

    <!-- O-3: ラストオーダーバナー -->
    <div class="lo-banner" id="lo-banner" style="display:none">ラストオーダーです。ご注文はお早めに！</div>
  </div>

  <!-- カテゴリナビ -->
  <nav class="category-nav" id="category-nav"></nav>

  <!-- N-2: 注文追跡セクション -->
  <div id="order-status-section" class="order-status-section" style="display:none"></div>

  <!-- 前回の注文（再注文セクション） -->
  <div id="reorder-section" style="display:none"></div>

  <!-- メニュー一覧 -->
  <main class="menu-container" id="menu-container">
    <div class="loading-overlay"><span class="loading-spinner"></span> メニューを読み込み中...</div>
  </main>

  <!-- Batch-E-3: cart-bar + checkout-bar を action-bar で統合 (縦 2 段 → 横 1 段) -->
  <div class="action-bar" id="action-bar">
    <!-- カートバー -->
    <div class="cart-bar" id="cart-bar" style="display:none">
      <div class="cart-bar__info">
        <span class="cart-bar__count" id="cart-count">0</span>品
        <span class="cart-bar__total" id="cart-total">&yen;0</span>
      </div>
      <button class="cart-bar__btn" id="btn-view-cart">注文を確認</button>

  <script>
  (function () {
    'use strict';

    var BASE_API = '../../api';
    var params = new URLSearchParams(window.location.search);
    var storeId = params.get('store_id') || params.get('store');
    var tableId = params.get('table_id') || params.get('table');
    var lang = localStorage.getItem('mt_lang') || 'ja';
    // P1-31: 繁體中文を運用判断で無効化。既存ユーザーの localStorage 'zh-Hant' は 'zh-Hans' にフォールバック
    if (lang === 'zh-Hant') {
      lang = 'zh-Hans';
      localStorage.setItem('mt_lang', lang);
    }
    var _uiText = {};   // L-4: UI翻訳辞書（langごとのキーバリュー）
    var _langMeta = {
      'ja':      { flag: '🇯🇵', code: 'JA', label: '日本語' },
      'en':      { flag: '🇺🇸', code: 'EN', label: 'English' },
      'zh-Hans': { flag: '🇨🇳', code: 'CN', label: '简体中文' },
      'ko':      { flag: '🇰🇷', code: 'KO', label: '한국어' }
    };
    var menuData = [];
    var settings = {};
    var _recommendations = {};  // menu_item_id -> {badge_type, comment}
    var _popularity = {};       // menu_item_id -> rank (1,2,3...)
    var _recList = [];          // おすすめ品目配列
    var planInfo = null;      // プランセッション情報（nullなら通常）
    var isPlanMode = false;   // プランメニュー表示中フラグ
    var _planTimerInterval = null;
    var courseInfo = null;     // コースセッション情報
    var isCourseMode = false;
    var _sessionPin = null;   // S6: PIN（コースポーリング用に保持）
    var _subToken = params.get('sub_token') || null; // F-QR1: 個別QR
    var _subSessionId = null;  // F-QR1: サブセッションID
    var _subLabel = null;      // F-QR1: ゲスト表示名
    var _coursePollingInterval = null;

    // L-8: セルフレジ
    var _checkoutAvailable = false; // payment_available フラグ
    var _checkoutPaymentId = null;  // 決済完了後の payment_id

    var isPreview = !tableId;

    if (!storeId) {
      document.getElementById('menu-container').innerHTML =
        '<div class="empty-state"><p>QRコードからアクセスしてください</p></div>';
      return;
    }

    // ============================================================
    // L-4: 多言語ヘルパー関数
    // ============================================================

    /** UI翻訳テキスト取得。_uiText にあればそれを返す。なければfallback */
    function _t(key, fallbackJa) {
      if (lang === 'ja') return fallbackJa;
      if (_uiText[key]) return _uiText[key];
      return fallbackJa;
    }

    // 外部JSから参照可能にする
    window.__posla_lang = function () { return lang; };
    window.__posla_t = _t;

    /** メニューアイテム/カテゴリ等の翻訳済み名前を取得 */
    function _getLocalizedName(obj, nameKey, nameEnKey) {
      nameKey = nameKey || 'name';
      nameEnKey = nameEnKey || 'nameEn';
      if (lang === 'ja') return obj[nameKey] || '';
      if (lang === 'en' && obj[nameEnKey]) return obj[nameEnKey];
      // zh-Hans, zh-Hant, ko は translations フィールドから取得
      if (obj.translations && obj.translations[lang] && obj.translations[lang].name) {
        return obj.translations[lang].name;
      }
      // フォールバック: en → ja
      if (obj[nameEnKey]) return obj[nameEnKey];
      return obj[nameKey] || '';
    }

    /** メニューアイテムの翻訳済み説明文を取得 */
    function _getLocalizedDesc(obj) {
      if (lang === 'ja') return obj.description || '';
      if (lang === 'en' && obj.descriptionEn) return obj.descriptionEn;
      if (obj.translations && obj.translations[lang] && obj.translations[lang].description) {
        return obj.translations[lang].description;
      }
      if (obj.descriptionEn) return obj.descriptionEn;
      return obj.description || '';
    }

    /** カテゴリの翻訳済み名前を取得 */
    function _getLocalizedCatName(cat) {
      if (lang === 'ja') return cat.categoryName;
      if (lang === 'en' && cat.categoryNameEn) return cat.categoryNameEn;
      if (cat.translations && cat.translations[lang] && cat.translations[lang].name) {
        return cat.translations[lang].name;
      }
      if (cat.categoryNameEn) return cat.categoryNameEn;
      return cat.categoryName;
    }

    /** オプショングループの翻訳済み名前 */
    function _getLocalizedGroupName(group) {
      return _getLocalizedName(group, 'groupName', 'groupNameEn');
    }

    /** オプション選択肢の翻訳済み名前 */
    function _getLocalizedChoiceName(choice) {
      return _getLocalizedName(choice, 'name', 'nameEn');
    }

    /** 言語セレクターUIを更新 */
    function _updateLangUI() {
      var meta = _langMeta[lang] || _langMeta['ja'];
      document.getElementById('lang-flag').textContent = meta.flag;
      document.getElementById('lang-code').textContent = meta.code;
      // アクティブ状態の更新
      var options = document.querySelectorAll('.lang-selector__option');
      for (var i = 0; i < options.length; i++) {
        var opt = options[i];
        if (opt.getAttribute('data-lang') === lang) {
          opt.classList.add('active');
        } else {
          opt.classList.remove('active');
        }
      }
      document.body.classList.toggle('lang-en', lang !== 'ja');
    }

    /** UI翻訳を読み込み */
    function _loadUiTranslations(targetLang, callback) {
      if (targetLang === 'ja') {
        _uiText = {};
        if (callback) callback();
        return;
      }
      fetch(BASE_API + '/customer/ui-translations.php?lang=' + encodeURIComponent(targetLang))
        .then(function (r) { return r.text(); })
        .then(function (text) {
          try {
            var json = JSON.parse(text);
            _uiText = (json.data && json.data.translations) ? json.data.translations : {};
          } catch (e) { _uiText = {}; }
          if (callback) callback();
        })
        .catch(function () {
          _uiText = {};
          if (callback) callback();
        });
    }

    /** 言語を切り替え */
    function _switchLang(newLang) {
      if (newLang === lang) return;
      lang = newLang;
      localStorage.setItem('mt_lang', lang);
      _updateLangUI();
      _loadUiTranslations(lang, function () {
        _refreshAllUI();
      });
    }

    /** 静的HTML要素のテキストを現在言語で更新 */
    function _updateStaticUI() {
      var el;
      // ヘッダー
      el = document.getElementById('btn-takeout');
      if (el) el.textContent = _t('takeout', 'テイクアウト');
      // ラストオーダーバナー（非LO時のみ更新）
      el = document.getElementById('lo-banner');
      if (el && !_isLastOrder) el.textContent = _t('last_order_banner', 'ラストオーダーです。ご注文はお早めに！');
      // カートバー
      el = document.getElementById('btn-view-cart');
      if (el) el.textContent = _t('view_cart', '注文を確認');
      // L-8: セルフレジ お会計ボタン (言語切替時に text が古いままだったバグ修正)
      el = document.getElementById('btn-checkout');
      if (el) el.textContent = _t('btn_checkout', 'お会計');
      // カートモーダル
      el = document.querySelector('#cart-overlay .cart-modal__header h2');
      if (el) el.textContent = _t('order_details', '注文内容');
      var memoLabels = document.querySelectorAll('.cart-memo-label');
      if (memoLabels[0]) memoLabels[0].textContent = _t('memo_label', 'ひとことメモ（任意）');
      if (memoLabels[1]) memoLabels[1].textContent = _t('allergy_label', 'アレルギー情報（該当があれば選択）');
      el = document.getElementById('order-memo');
      if (el) el.placeholder = _t('memo_placeholder', '例：ネギ抜きで、辛さ控えめ');
      // P1-19: アレルギーチップのラベル
      var allergenLabels = [
        { code: 'egg', ja: '卵' },
        { code: 'milk', ja: '乳' },
        { code: 'wheat', ja: '小麦' },
        { code: 'shrimp', ja: 'えび' },
        { code: 'crab', ja: 'かに' },
        { code: 'buckwheat', ja: 'そば' },
        { code: 'peanut', ja: '落花生' }
      ];
      for (var ai = 0; ai < allergenLabels.length; ai++) {
        var allergenEl = document.querySelector('span[data-allergen="' + allergenLabels[ai].code + '"]');
        if (allergenEl) allergenEl.textContent = _t('allergen_' + allergenLabels[ai].code, allergenLabels[ai].ja);
      }
      // 送信ボタン（LO時以外）
      el = document.getElementById('btn-send-order');
      if (el && !_isLastOrder) el.textContent = _t('send_order', '注文を送信');
      // オプションモーダル
      el = document.getElementById('btn-option-add');
      if (el) el.textContent = _t('add_to_cart', 'カートに追加');
      // セッション終了
      el = document.getElementById('session-ended-title');
      if (el) el.textContent = _t('session_ended_title', 'ご利用ありがとうございました');
      el = document.getElementById('session-ended-msg');
      if (el) el.textContent = _t('session_ended_msg', 'お会計が完了しました。またのご来店をお待ちしております。');
      // 評価モーダル
      el = document.querySelector('.rating-modal__sub');
      if (el) el.textContent = _t('rating_question', 'お料理はいかがですか？');
      var ratingKeys = ['rating_1', 'rating_2', 'rating_3', 'rating_4', 'rating_5'];
      var ratingJa = ['残念', '微妙', '普通', 'おいしい', '最高!'];
      var ratingFaces = document.querySelectorAll('.rating-modal__face span');
      for (var ri = 0; ri < ratingFaces.length && ri < 5; ri++) {
        ratingFaces[ri].textContent = _t(ratingKeys[ri], ratingJa[ri]);
      }
      el = document.getElementById('rating-skip');
      if (el) el.textContent = _t('rating_skip', 'あとで');
      // 注文トースト
      el = document.getElementById('order-toast');
      if (el) el.textContent = _t('order_success', 'ご注文ありがとうございます！');
      // 呼び出しボタン（call-staff.js が生成）
      el = document.querySelector('.cs-btn');
      if (el && !el.disabled) el.innerHTML = '&#x1F514; ' + _t('call_staff', '呼び出し');
      // AIウェイターFAB（ai-waiter.js が生成）
      el = document.querySelector('.aiw-fab-label');
      if (el) el.textContent = _t('ask_ai', 'AIに聞く');
      el = document.querySelector('.aiw-fab');
      if (el) el.setAttribute('aria-label', _t('ask_ai', 'AIに聞く'));

      // === AIウェイターパネル（ai-waiter.js が生成したDOM） ===
      var aiwTitle = document.querySelector('.aiw-header-title');
      if (aiwTitle) aiwTitle.innerHTML = '\uD83E\uDD16 ' + _t('aiw_title', 'AIウェイター');

      var aiwWelcome = document.querySelector('.aiw-welcome');
      if (aiwWelcome) {
        aiwWelcome.innerHTML = _t('aiw_welcome', '何でもお気軽にどうぞ！😊') + '<br>'
          + _t('aiw_example1', '「辛いものは苦手です」') + '<br>'
          + _t('aiw_example2', '「ボリュームある定食は？」') + '<br>'
          + _t('aiw_example3', '「おすすめを教えて」');
      }

      var aiwInput = document.getElementById('aiw-input');
      if (aiwInput) aiwInput.placeholder = _t('aiw_placeholder', 'メニューについて質問...');

      // === スタッフ呼び出しモーダル（call-staff.js が生成したDOM） ===
      var csHeader = document.querySelector('.cs-modal__header');
      if (csHeader) csHeader.textContent = _t('cs_confirm', 'スタッフを呼びますか？');

      var csCancel = document.getElementById('cs-cancel');
      if (csCancel) csCancel.textContent = _t('cs_cancel', 'キャンセル');

      // 呼び出し理由ボタン
      var csReasons = document.querySelectorAll('.cs-modal__reason');
      var reasonKeys = [
        { key: 'cs_reason_order', ja: '注文したい' },
        { key: 'cs_reason_check', ja: 'お会計をお願いします' },
        { key: 'cs_reason_clear', ja: '食器を下げてください' },
        { key: 'cs_reason_other', ja: 'その他' }
      ];
      for (var cri = 0; cri < csReasons.length && cri < reasonKeys.length; cri++) {
        csReasons[cri].textContent = _t(reasonKeys[cri].key, reasonKeys[cri].ja);
      }
    }

    /** 全UIを再描画 */
    function _refreshAllUI() {
      _updateStaticUI();
      renderCategoryNav();
      if (isCourseMode) {
        showCourseBanner();
        renderCourseView();
      } else {
        renderMenu();
      }
      // カートバーの更新
      updateCartBar();
    }

    // 言語セレクター: ドロップダウンの開閉
    document.getElementById('btn-lang').addEventListener('click', function (e) {
      e.stopPropagation();
      document.getElementById('lang-dropdown').classList.toggle('open');
    });
    // 言語選択
    var langOptions = document.querySelectorAll('.lang-selector__option');
    for (var _li = 0; _li < langOptions.length; _li++) {
      langOptions[_li].addEventListener('click', function () {
        var newLang = this.getAttribute('data-lang');
        document.getElementById('lang-dropdown').classList.remove('open');
        _switchLang(newLang);
      });
    }
    // 外側クリックで閉じる
    document.addEventListener('click', function () {
      document.getElementById('lang-dropdown').classList.remove('open');
    });

    // 初期表示設定
    _updateLangUI();
    if (lang !== 'ja') {
      _loadUiTranslations(lang, function () { _updateStaticUI(); });
    }

    // ============================================================
    // ウェルカムモーダル
    // ============================================================
    var _welcomeTimer = null;

    function showWelcomeModal(sessionData, onDismiss) {
      var overlay = document.getElementById('welcome-overlay');
      var storeName = _getLocalizedName(sessionData.store);

      document.getElementById('welcome-store').textContent =
        _t('welcome_prefix', '') + storeName + _t('welcome_suffix', 'へようこそ！');

      var msg = '';
      if (lang === 'ja') {
        msg = sessionData.welcomeMessage || 'いらっしゃいませ！ご注文はメニューからどうぞ';
      } else if (lang === 'en') {
        msg = sessionData.welcomeMessageEn || _t('welcome_default', 'Welcome! Please order from the menu.');
      } else {
        msg = _t('welcome_default', 'いらっしゃいませ！ご注文はメニューからどうぞ');
      }
      document.getElementById('welcome-msg').textContent = msg;

      var waitEl = document.getElementById('welcome-wait');
      if (sessionData.avgWaitMinutes && sessionData.avgWaitMinutes > 0) {
        var waitText = _t('wait_time', '約{min}分お待ちいただきます');
        waitEl.textContent = waitText.replace('{min}', sessionData.avgWaitMinutes);
        waitEl.style.display = '';
      } else {
        waitEl.style.display = 'none';
      }

      document.getElementById('btn-welcome-dismiss').textContent =
        _t('btn_order', 'メニューを見る');

      function dismiss() {
        if (dismissed) return;

        overlay.classList.remove('open');
        if (_welcomeTimer) { clearTimeout(_welcomeTimer); _welcomeTimer = null; }
        onDismiss();
      }

      document.getElementById('btn-welcome-dismiss').addEventListener('click', dismiss);
      overlay.addEventListener('click', function (e) {
        if (e.target === overlay) dismiss();
      });

      overlay.classList.add('open');
      _welcomeTimer = setTimeout(dismiss, 3000);
    }

    // N-12: 店舗ブランディング適用
    function applyBranding(store) {
      var color = store.brandColor;
      if (color) {
        document.documentElement.style.setProperty('--orange', color);
        document.documentElement.style.setProperty('--orange-dark', color);
        document.documentElement.style.setProperty('--orange-light', color + '1a');
      }
      var logoUrl = store.brandLogoUrl || '';
      if (logoUrl) {
        var el = document.getElementById('store-name');
        if (el) {
          var img = document.createElement('img');
          img.src = logoUrl;
          img.alt = '';
          img.style.cssText = 'height:28px;margin-right:6px;vertical-align:middle;';
          img.onerror = function () { this.style.display = 'none'; };
          el.insertBefore(img, el.firstChild);
        }
      }
      var displayName = store.brandDisplayName || '';
      if (displayName) {
        var nameEl = document.getElementById('store-name');
        if (nameEl) {
          for (var i = 0; i < nameEl.childNodes.length; i++) {
            if (nameEl.childNodes[i].nodeType === 3) {
              nameEl.childNodes[i].textContent = displayName;
              return;
            }
          }
          nameEl.appendChild(document.createTextNode(displayName));
        }
      }
    }

    if (isPreview) {
      // プレビューモード: テーブルセッション不要、メニュー閲覧のみ
      document.getElementById('table-name').textContent = 'プレビュー';
      document.getElementById('cart-bar').style.display = 'none';
      loadMenu();
    } else {
      // 通常モード: テーブルセッション取得
      // S6: PIN対応セッション取得
      function fetchTableSession(pin) {
        var sessionUrl = BASE_API + '/customer/table-session.php?store_id=' + storeId + '&table_id=' + tableId;
        if (pin) sessionUrl += '&pin=' + encodeURIComponent(pin);
        if (_subToken) sessionUrl += '&sub_token=' + encodeURIComponent(_subToken);

        fetch(sessionUrl)
          .then(function (r) {
            return r.text().then(function (body) {
              if (!body) throw new Error('サーバーが空のレスポンスを返しました');
              try { return JSON.parse(body); }
              catch (e) { throw new Error('応答の解析に失敗しました'); }
            });
          })
          .then(function (json) {
            if (!json.ok) {
              var errCode = json.error && json.error.code;
              // S6: PIN関連エラー → PIN入力ダイアログ
              if (errCode === 'PIN_REQUIRED' || errCode === 'INVALID_PIN') {
                showPinDialog(errCode === 'INVALID_PIN');
                return;
              }
              // その他のエラー（NO_ACTIVE_SESSION, SESSION_COOLDOWN 等）
              document.getElementById('menu-container').innerHTML =
                '<div class="empty-state"><p>' + Utils.escapeHtml((json.error && json.error.message) || 'セッション取得失敗') + '</p></div>';
              return;
            }
            _sessionPin = pin; // S6: PIN保持（コースポーリング用）
            // F-QR1: サブセッション情報保持
            if (json.data.subSessionId) {
              _subSessionId = json.data.subSessionId;
              _subLabel = json.data.subLabel;
              if (typeof OrderSender !== 'undefined' && OrderSender.setSubSessionId) {
                OrderSender.setSubSessionId(_subSessionId);
              }
            }
            handleSessionData(json.data);
          })
          .catch(function (err) {
            document.getElementById('menu-container').innerHTML =
              '<div class="empty-state"><p>' + Utils.escapeHtml(err.message) + '</p></div>';
          });
      }

      // S6: セッションデータ処理（PIN認証後も同じ処理を実行）
      function handleSessionData(d) {
        document.getElementById('store-name').textContent = d.store.name;
        applyBranding(d.store);
        document.getElementById('table-name').textContent = d.table.tableCode;
        CartManager.init(storeId, tableId, d.sessionToken, BASE_API);

        function proceedAfterWelcome() {
          // コースセッション検出（プランより優先チェック）
          if (d.course && d.course.id) {
            courseInfo = d.course;
            isCourseMode = true;
            showCourseBanner();
            renderCourseView();
            startCoursePolling();
            startTokenValidation();
            startOrderTracking();
            startLastOrderCheck();
            return;
          }

          // プランセッション検出
          if (d.plan && d.plan.id) {
            planInfo = d.plan;
            isPlanMode = true;
            CartManager.setPlanMode(true);
            showPlanBanner();
          }

          loadMenu();
        }

        // L-8: Stripe決済完了後のリダイレクト処理
        var checkoutResult = params.get('checkout');
        if (checkoutResult === 'success') {
          var stripeSessionId = params.get('stripe_session_id');
          if (stripeSessionId) {
            handleCheckoutSuccess(stripeSessionId);
            return;
          }
        } else if (checkoutResult === 'cancel') {
          showCheckoutCancelToast();
          var cleanUrl = window.location.pathname + '?store_id=' + encodeURIComponent(storeId) + '&table_id=' + encodeURIComponent(tableId);
          window.history.replaceState(null, '', cleanUrl);
        }

        // ウェルカムモーダル表示（sessionStorage で重複防止）
        if (!sessionStorage.getItem('mt_welcome_shown')) {
          sessionStorage.setItem('mt_welcome_shown', '1');
          showWelcomeModal(d, proceedAfterWelcome);
        } else {
          proceedAfterWelcome();
        }
      }

      // S6: PIN入力ダイアログ
      function showPinDialog(isRetry) {
        var container = document.getElementById('menu-container');
        var retryMsg = isRetry ? '<p style="color:#d32f2f;font-weight:600;margin-bottom:1rem">PINが正しくありません</p>' : '';
        container.innerHTML =
          '<div style="padding:2rem 1rem;text-align:center;max-width:320px;margin:0 auto">'
          + '<div style="width:56px;height:56px;margin:0 auto 1rem;background:#fff3e0;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:1.25rem;font-weight:700;color:#ff6f00">PIN</div>'
          + '<h2 style="font-size:1.125rem;font-weight:700;margin-bottom:0.5rem">着席PINを入力</h2>'
          + '<p style="color:#666;font-size:0.875rem;margin-bottom:1.5rem">スタッフからお伝えした4桁のPINを入力してください</p>'
          + retryMsg
          + '<input type="tel" id="pin-input" maxlength="4" pattern="[0-9]*" inputmode="numeric" '
          + 'style="font-size:2rem;text-align:center;width:8rem;padding:0.75rem;border:2px solid #ccc;border-radius:8px;letter-spacing:0.5rem" '
          + 'placeholder="----">'
          + '<br><button id="pin-submit" style="margin-top:1rem;background:#ff6f00;color:#fff;border:none;border-radius:8px;padding:0.75rem 2rem;font-size:1rem;font-weight:700;cursor:pointer;opacity:0.5" disabled>確認</button>'
          + '</div>';

        var pinInput = document.getElementById('pin-input');
        var pinSubmit = document.getElementById('pin-submit');

        pinInput.addEventListener('input', function () {
          var filled = this.value.length === 4;
          pinSubmit.disabled = !filled;
          pinSubmit.style.opacity = filled ? '1' : '0.5';
        });

        pinSubmit.addEventListener('click', function () {
          var pin = pinInput.value;
          if (pin.length !== 4) return;
          pinSubmit.disabled = true;
          pinSubmit.textContent = '確認中...';
          fetchTableSession(pin);
        });

        pinInput.focus();
      }

      fetchTableSession(null);
    }

    function loadMenu() {
      var menuUrl = BASE_API + '/customer/menu.php?store_id=' + storeId;
      if (isPlanMode && planInfo) {
        menuUrl += '&plan_id=' + encodeURIComponent(planInfo.id);
      }
      fetch(menuUrl)
        .then(function (r) {
          return r.text().then(function (body) {
            if (!body) throw new Error('サーバーが空のレスポンスを返しました');
            try { return JSON.parse(body); }
            catch (e) { throw new Error('応答の解析に失敗しました'); }
          });
        })
        .then(function (json) {
          if (!json.ok) throw new Error((json.error && json.error.message) || 'メニュー取得失敗');
          var d = json.data;
          menuData = d.categories || [];
          settings = d.settings || {};
          // N-1/N-6: おすすめ・人気ランキング
          _recList = d.recommendations || [];
          _recommendations = {};
          for (var ri = 0; ri < _recList.length; ri++) {
            _recommendations[_recList[ri].menu_item_id] = _recList[ri];

          renderMenu();
          if (!isPreview) {
            updateCartBar();

            startTokenValidation();
            loadOrderHistory();
            startOrderTracking();
            startLastOrderCheck();
            checkSelfCheckout(); // L-8: 既存注文があればチェックアウトバー表示
          }
          // テイクアウト導線
          (function() {
            var takeoutBtn = document.getElementById('btn-takeout');
            if (!takeoutBtn) return;
            fetch(BASE_API + '/customer/takeout-orders.php?action=settings&store_id=' + storeId)
              .then(function(res) { return res.text(); })
              .then(function(text) {
                try {
                  var json = JSON.parse(text);
                  if (json.ok && json.data && json.data.takeout_enabled) {
                    takeoutBtn.style.display = '';
                    takeoutBtn.href = 'takeout.html?store_id=' + encodeURIComponent(storeId);
                  }
                } catch(e) {}
              })
              .catch(function() {});
          })();

        .catch(function (err) {

            '<div class="empty-state"><p>' + Utils.escapeHtml(err.message) + '</p></div>';

    // ============================================================
    // メニュー変更検知（品切れ即時反映）
    // ============================================================
    var _versionTimer = null;
    var _lastMenuVersion = null;
    var _VERSION_CHECK_INTERVAL = 2000; // 2秒

    function startMenuVersionCheck() {
      if (_versionTimer || isPreview) return;
      _versionTimer = setInterval(checkMenuVersion, _VERSION_CHECK_INTERVAL);
    }

    function checkMenuVersion() {
      fetch(BASE_API + '/store/menu-version.php?store_id=' + storeId + '&_t=' + Date.now())
        .then(function (r) {
          return r.text().then(function (body) {
            if (!body) return null;
            try { return JSON.parse(body); } catch (e) { return null; }
          });
        })
        .then(function (json) {
          if (!json || !json.ok) return;
          var v = json.data.version;
          if (_lastMenuVersion && v !== _lastMenuVersion) {
            // バージョン変更を検出 → フルメニュー取得
            refreshMenuSilent();
          }
          _lastMenuVersion = v;
        })
        .catch(function () { /* サイレント失敗 */ });
    }

    function refreshMenuSilent() {
      var menuUrl = BASE_API + '/customer/menu.php?store_id=' + storeId;
      if (isPlanMode && planInfo) {
        menuUrl += '&plan_id=' + encodeURIComponent(planInfo.id);
      }
      fetch(menuUrl + '&_t=' + Date.now())
        .then(function (r) {
          return r.text().then(function (body) {
            if (!body) return null;
            try { return JSON.parse(body); } catch (e) { return null; }
          });
        })
        .then(function (json) {
          if (!json || !json.ok) return;
          var newData = json.data.categories || [];
          // N-1/N-6: おすすめ・人気ランキング更新
          var recArr = json.data.recommendations || [];
          _recommendations = {};
          for (var rri = 0; rri < recArr.length; rri++) {
            _recommendations[recArr[rri].menu_item_id] = recArr[rri];
          }
          _recList = recArr;
          _popularity = json.data.popularity || {};
          // 品切れ商品を検出
          var soldOutIds = {};
          newData.forEach(function (cat) {
            (cat.items || []).forEach(function (item) {
              if (item.soldOut) soldOutIds[item.menuItemId] = item.name;
            });
          });
          // カート内の品切れ商品を除去
          var cart = CartManager.getCart();
          var removedNames = [];
          var cleanCart = cart.filter(function (ci) {
            if (soldOutIds[ci.id]) {
              removedNames.push(soldOutIds[ci.id]);
              return false;
            }
            return true;
          });
          if (removedNames.length > 0) {
            var unique = [];
            for (var ri = 0; ri < removedNames.length; ri++) {
              if (unique.indexOf(removedNames[ri]) === -1) unique.push(removedNames[ri]);
            }
            localStorage.setItem('mt_cart_' + storeId + '_' + tableId, JSON.stringify(cleanCart));
            updateCartBar();
            alert(unique.join('、') + _t('sold_out_removed', 'が品切れになりました。カートから削除しました。'));
          }
          menuData = newData;
          renderMenu();
          if (!isPreview) updateCartBar();
          if (_lastOrders && _lastOrders.length > 0) renderReorderSection(_lastOrders);
        })
        .catch(function () { /* サイレント失敗 */ });
    }

    // ============================================================
    // メニューデータ検索ヘルパー
    // ============================================================
    function findMenuItem(menuItemId) {
      for (var ci = 0; ci < menuData.length; ci++) {
        var items = menuData[ci].items || [];
        for (var ii = 0; ii < items.length; ii++) {
          if (items[ii].menuItemId === menuItemId) return items[ii];
        }
      }
      return null;
    }

    function hasOptions(menuItemId) {
      var item = findMenuItem(menuItemId);
      return item && item.optionGroups && item.optionGroups.length > 0;
    }

    // ============================================================
    // 前回の注文（再注文セクション）
    // ============================================================
    var _reorderItems = [];
    var _lastOrders = [];

    function loadOrderHistory() {
      if (isPreview || isPlanMode || isCourseMode) return;
      var token = CartManager.getSessionToken();
      if (!token) return;

      fetch(BASE_API + '/customer/order-history.php?store_id=' + storeId
        + '&table_id=' + tableId
        + '&session_token=' + encodeURIComponent(token))
        .then(function (r) {
          return r.text().then(function (body) {
            if (!body) return null;
            try { return JSON.parse(body); } catch (e) { return null; }
          });
        })
        .then(function (json) {
          if (!json || !json.ok) return;
          renderReorderSection(json.data.orders || []);
        })
        .catch(function () { /* サイレント失敗 */ });
    }

    function renderReorderSection(orders) {
      var section = document.getElementById('reorder-section');
      _reorderItems = [];
      _lastOrders = orders || [];

      if (_lastOrders.length === 0) {
        section.style.display = 'none';
        return;
      }

      // 全注文のアイテムをフラットにし、同一アイテム+オプションは合算
      var map = {};
      for (var oi = 0; oi < _lastOrders.length; oi++) {
        var orderItems = _lastOrders[oi].items || [];
        for (var ii = 0; ii < orderItems.length; ii++) {
          var item = orderItems[ii];
          var key = item.id;
          if (item.options && item.options.length > 0) {
            var optIds = [];
            for (var k = 0; k < item.options.length; k++) {
              optIds.push(item.options[k].choiceId);
            }
            optIds.sort();
            key += '__' + optIds.join(',');
          }
          if (map[key]) {
            map[key].qty += (item.qty || 1);
          } else {
            map[key] = {
              id: item.id,
              name: item.name,
              price: item.price,
              qty: item.qty || 1,
              options: item.options || [],
              basePrice: item.basePrice || null
            };
            _reorderItems.push(map[key]);
          }
        }
      }

      if (_reorderItems.length === 0) {
        section.style.display = 'none';
        return;
      }

      var titleText = _t('previous_orders', '前回のご注文');
      var html = '<div class="reorder-section">';
      html += '<div class="reorder-section__title">' + Utils.escapeHtml(titleText) + '</div>';

      for (var ri = 0; ri < _reorderItems.length; ri++) {
        var rItem = _reorderItems[ri];
        var menuItem = findMenuItem(rItem.id);
        var isSoldOut = !menuItem || !!menuItem.soldOut;
        var displayName = menuItem ? _getLocalizedName(menuItem) : rItem.name;

        var optDesc = '';
        if (rItem.options.length > 0) {
          var optNames = [];
          for (var oni = 0; oni < rItem.options.length; oni++) {
            optNames.push(rItem.options[oni].choiceName);
          }
          optDesc = optNames.join(', ');
        }

        var priceText = '';
        if (!isSoldOut) {
          var currentPrice = menuItem.price;
          if (rItem.options.length > 0) {
            var optDiff = 0;
            for (var opi = 0; opi < rItem.options.length; opi++) {
              optDiff += (rItem.options[opi].price || 0);
            }
            currentPrice += optDiff;
          }
          priceText = Utils.formatYen(currentPrice);
        }

        var btnClass = 'reorder-item__add' + (isSoldOut ? ' reorder-item__add--disabled' : '');
        var btnText = isSoldOut
          ? _t('sold_out', '品切れ')
          : ('+ ' + _t('btn_add', '追加'));

        html += '<div class="reorder-item">';
        html += '<div class="reorder-item__info">';
        html += '<div class="reorder-item__name">' + Utils.escapeHtml(displayName) + '</div>';
        if (optDesc) {
          html += '<div class="reorder-item__meta">' + Utils.escapeHtml(optDesc) + '</div>';
        }
        html += '<div class="reorder-item__meta">'
          + Utils.escapeHtml(String(rItem.qty)) + _t('items_count', '点')
          + (priceText ? ' ' + priceText : '')
          + '</div>';
        html += '</div>';
        html += '<button class="' + btnClass + '" data-reorder-idx="' + ri + '"'
          + (isSoldOut ? ' disabled' : '') + '>' + btnText + '</button>';
        html += '</div>';
      }

      html += '</div>';
      section.innerHTML = html;
      section.style.display = '';
    }

    document.getElementById('reorder-section').addEventListener('click', function (e) {
      var btn = e.target.closest('.reorder-item__add');
      if (!btn || btn.disabled) return;
      var idx = parseInt(btn.dataset.reorderIdx, 10);
      var rItem = _reorderItems[idx];
      if (!rItem) return;

      var menuItem = findMenuItem(rItem.id);
      if (!menuItem || menuItem.soldOut) {
        showReorderToast(_t('sold_out', '品切れです'));
        return;
      }

      var currentPrice = menuItem.price;
      if (rItem.options.length > 0) {
        var optDiff = 0;
        for (var i = 0; i < rItem.options.length; i++) {
          optDiff += (rItem.options[i].price || 0);
        }
        CartManager.addItem({
          id: rItem.id,
          name: rItem.name,
          price: currentPrice + optDiff,
          basePrice: currentPrice,
          options: rItem.options
        });
      } else {
        CartManager.addItem({
          id: rItem.id,
          name: rItem.name,
          price: currentPrice
        });
      }

      renderMenu();
      updateCartBar();
      showReorderToast(_t('added_to_cart', 'カートに追加しました'));
    });

      toast.classList.add('show');

    function buildItemBadges(itemId, source) {
      var badges = '';

      // N-1: おすすめバッジ
      var rec = _recommendations[itemId];

    // Batch-E-2: IntersectionObserver でカテゴリナビの active を追跡
    //   スクロール中に現在表示中のセクションに応じて .category-nav__btn--active を付与
    //   また active になったボタンを横スクロール中央に寄せる
    //   非対応ブラウザ (IE11 等) はスキップ、既存の click/scrollIntoView フローは不変
    var _categoryObserver = null;
    function setupCategoryTracking() {
      if (typeof IntersectionObserver === 'undefined') return;
      // 既存 observer があれば解除してから再構築 (再描画時の多重観察防止)
      if (_categoryObserver) {
        try { _categoryObserver.disconnect(); } catch (e) {}
        _categoryObserver = null;
      }
      var sections = document.querySelectorAll('.menu-section');
      if (!sections.length) return;

      // rootMargin: 上部はヘッダー + state-bar + category-nav 分を差し引き
      // 下部は 60% でトップ寄りの section を active に
      _categoryObserver = new IntersectionObserver(function (entries) {
        // 最上部に到達した entry を優先して active 化
        var bestEntry = null;
        var bestTop = Infinity;
        for (var i = 0; i < entries.length; i++) {
          var e = entries[i];
          if (!e.isIntersecting) continue;
          var top = e.boundingClientRect.top;
          if (top < bestTop) { bestTop = top; bestEntry = e; }
        }
        if (!bestEntry) return;
        var sectionId = bestEntry.target.id; // 'cat-<id>' or 'cat-recommendations'
        var catId = sectionId.indexOf('cat-') === 0 ? sectionId.substring(4) : sectionId;

        var btns = document.querySelectorAll('.category-nav__btn');
        var activeBtn = null;
        for (var b = 0; b < btns.length; b++) {
          var isActive = btns[b].getAttribute('data-cat') === catId;
          btns[b].classList.toggle('category-nav__btn--active', isActive);
          if (isActive) activeBtn = btns[b];
        }

        // active ボタンを category-nav の横スクロール中央に寄せる (スムーズ)
        if (activeBtn && activeBtn.scrollIntoView) {
          try {
            activeBtn.scrollIntoView({ behavior: 'smooth', block: 'nearest', inline: 'center' });
          } catch (e) { /* block/inline オプション非対応ブラウザ */ }
        }
      }, {
        root: null,
        rootMargin: '-120px 0px -60% 0px',
        threshold: 0
      });

      for (var i = 0; i < sections.length; i++) {
        _categoryObserver.observe(sections[i]);
      }
    }

          var priceDiff = choice.priceDiff || 0;
          var priceLabel = '';
          var priceClass = 'option-choice__price';
          if (priceDiff > 0) {
            priceLabel = '+' + Utils.formatYen(priceDiff);
          } else if (priceDiff < 0) {
            priceLabel = Utils.formatYen(priceDiff);
          } else {
            priceLabel = '&plusmn;0';

          }

          html += '<label class="option-choice">'
            + '<input class="option-choice__input" type="' + inputType + '"'
            + ' name="' + inputName + '"'

            + ' data-price-diff="' + priceDiff + '"'
            + checked + '>'

    // 選択変更 → 価格更新 + バリデーション
    document.getElementById('option-modal-body').addEventListener('change', function () {
      updateOptionPrice();
    });

    function updateOptionPrice() {
      if (!_optionItem) return;

      var basePrice = _optionItem.price;
      var totalDiff = 0;
      var groups = _optionItem.optionGroups || [];
      var allValid = true;

      groups.forEach(function (group, gi) {
        var inputs = document.querySelectorAll('input[data-group-index="' + gi + '"]');
        var checkedInputs = document.querySelectorAll('input[data-group-index="' + gi + '"]:checked');
        var checkedCount = checkedInputs.length;

        // 価格差分を合算
        checkedInputs.forEach(function (inp) {
          totalDiff += parseInt(inp.dataset.priceDiff, 10) || 0;
        });

        // バリデーション
        var groupEl = document.querySelector('.option-group[data-group-index="' + gi + '"]');
        if (group.isRequired && checkedCount < (group.minSelect || 1)) {
          allValid = false;
          if (groupEl) groupEl.classList.add('option-group--error');
        } else if (group.selectionType === 'multi' && group.maxSelect && checkedCount > group.maxSelect) {
          allValid = false;
          if (groupEl) groupEl.classList.add('option-group--error');
        } else {
          if (groupEl) groupEl.classList.remove('option-group--error');
        }
      });

      var finalPrice = basePrice + totalDiff;
      document.getElementById('option-modal-price').textContent = Utils.formatYen(finalPrice);
      document.getElementById('btn-option-add').disabled = !allValid;
    }

    // multiのmaxSelect制御
    document.getElementById('option-modal-body').addEventListener('change', function (e) {
      var inp = e.target;
      if (inp.type !== 'checkbox') return;
      var gi = parseInt(inp.dataset.groupIndex, 10);
      if (!_optionItem) return;
      var group = _optionItem.optionGroups[gi];
      if (!group || group.selectionType !== 'multi' || !group.maxSelect) return;

      var checked = document.querySelectorAll('input[data-group-index="' + gi + '"]:checked');
      if (checked.length > group.maxSelect) {
        inp.checked = false;
      }
    });

    // カートに追加
    document.getElementById('btn-option-add').addEventListener('click', function () {
      if (!_optionItem) return;

      var item = _optionItem;
      var groups = item.optionGroups || [];
      var selectedOptions = [];
      var totalDiff = 0;

      groups.forEach(function (group, gi) {
        var checkedInputs = document.querySelectorAll('input[data-group-index="' + gi + '"]:checked');
        checkedInputs.forEach(function (inp) {
          var choiceId = inp.value;
          var choice = null;
          for (var ci = 0; ci < group.choices.length; ci++) {
            if (group.choices[ci].choiceId === choiceId) {
              choice = group.choices[ci];
              break;
            }
          }
          if (choice) {
            var diff = choice.priceDiff || 0;
            totalDiff += diff;
            selectedOptions.push({
              groupId: group.groupId,
              groupName: group.groupName,
              choiceId: choice.choiceId,
              choiceName: choice.name,
              price: diff
            });
          }
        });
      });

      CartManager.addItem({
        id: item.menuItemId,
        name: item.name,
        price: item.price + totalDiff,
        basePrice: item.price,
        options: selectedOptions
      });

      closeOptionModal();
      renderMenu();
      updateCartBar();
    });

        var items = menuData[ci].items || [];
        for (var ii = 0; ii < items.length; ii++) {
          if (items[ii].menuItemId === id) return items[ii];

      return null;

    function _getCartItemName(cartItem) {

      return cartItem.name; // フォールバック

    function _getCartOptionName(option) {
      // optionGroupsから選択肢を検索
      for (var ci = 0; ci < menuData.length; ci++) {
        var items = menuData[ci].items || [];
        for (var ii = 0; ii < items.length; ii++) {
          var ogs = items[ii].optionGroups || [];
          for (var gi = 0; gi < ogs.length; gi++) {
            if (ogs[gi].groupId !== option.groupId) continue;
            var choices = ogs[gi].choices || [];
            for (var chi = 0; chi < choices.length; chi++) {
              if (choices[chi].choiceId === option.choiceId) {
                return _getLocalizedName(choices[chi]);
              }
            }
          }
        }
      }
      return option.choiceName; // フォールバック
    }

        .then(function () {

            btn.disabled = false;
            btn.textContent = _t('btn_order', '注文を送信');
          }

    // ============================================================
    // プランバナー（残り時間表示）
    // ============================================================
    function showPlanBanner() {
      if (!planInfo) return;
      var banner = document.getElementById('plan-banner');
      var nameEl = document.getElementById('plan-banner-name');
      var nameText = _getLocalizedName(planInfo);
      nameEl.textContent = nameText;
      banner.style.display = '';
      updatePlanTimer();
      _planTimerInterval = setInterval(updatePlanTimer, 30000); // 30秒ごと更新
    }

    function updatePlanTimer() {
      if (!planInfo || !planInfo.expiresAt) return;
      var timeEl = document.getElementById('plan-banner-time');
      var now = new Date();
      var expires = new Date(planInfo.expiresAt.replace(' ', 'T'));
      var lastOrder = planInfo.lastOrderAt ? new Date(planInfo.lastOrderAt.replace(' ', 'T')) : null;

      var remainMs = expires.getTime() - now.getTime();
      var remainMin = Math.ceil(remainMs / 60000);

      if (remainMin <= 0) {
        timeEl.textContent = _t('time_expired', '時間終了');
        timeEl.className = 'plan-banner__time plan-banner__time--ended';
        clearInterval(_planTimerInterval);
        return;
      }

      if (lastOrder && now >= lastOrder) {
        timeEl.textContent = _t('last_order_closed', 'ラストオーダー終了');
        timeEl.className = 'plan-banner__time plan-banner__time--ended';
        return;
      }

      var loRemainMs = lastOrder ? lastOrder.getTime() - now.getTime() : remainMs;
      var loRemainMin = Math.ceil(loRemainMs / 60000);

      var timeText = _t('remaining_min', '残り {min}分').replace('{min}', remainMin);
      if (lastOrder) timeText += _t('lo_before', '（LO {min}分前）').replace('{min}', loRemainMin);
      timeEl.textContent = timeText;

      // 残り10分以下で警告スタイル
      if (loRemainMin <= 10) {
        timeEl.className = 'plan-banner__time plan-banner__time--warning';
      } else {
        timeEl.className = 'plan-banner__time';
      }
    }

    function showCourseBanner() {
      if (!courseInfo) return;
      var banner = document.getElementById('course-banner');
      var nameEl = document.getElementById('course-banner-name');
      var subEl = document.getElementById('course-banner-sub');
      var nameText = _getLocalizedName(courseInfo);
      nameEl.textContent = nameText;
      var phaseCount = courseInfo.phases ? courseInfo.phases.length : 0;
      subEl.textContent = phaseCount + _t('course_view_only', '品のコース — 閲覧専用');
      banner.style.display = '';
      // カートバー・カテゴリナビ非表示
      document.getElementById('cart-bar').style.display = 'none';
      document.getElementById('category-nav').style.display = 'none';
    }

    function renderCourseView() {
      if (!courseInfo || !courseInfo.phases) return;
      var container = document.getElementById('menu-container');
      var currentPhase = courseInfo.currentPhase || 1;

      var html = '';
      courseInfo.phases.forEach(function (phase) {
        var phNum = phase.phaseNumber;
        var stateClass = '';
        var badgeText = '';
        if (phNum < currentPhase) {
          stateClass = ' course-phase--done';
          badgeText = _t('course_done', '完了');
        } else if (phNum === currentPhase) {
          stateClass = ' course-phase--current';
          badgeText = _t('course_serving', '提供中');
        } else {
          stateClass = ' course-phase--future';
          badgeText = _t('course_upcoming', 'まもなく');
        }

        var phaseName = _getLocalizedName(phase);

        html += '<div class="course-phase' + stateClass + '">';
        html += '<div class="course-phase__header">';
        html += '<span class="course-phase__num">' + phNum + '</span>';
        html += '<span class="course-phase__name">' + Utils.escapeHtml(phaseName) + '</span>';
        html += '<span class="course-phase__badge">' + badgeText + '</span>';
        html += '</div>';

        html += '<ul class="course-phase__items">';
        (phase.items || []).forEach(function (item) {
          var itemName = _getLocalizedName(item);
          var qtyStr = item.qty > 1 ? ' x' + item.qty : '';
          html += '<li>' + Utils.escapeHtml(itemName) + qtyStr + '</li>';
        });
        html += '</ul></div>';
      });

      container.innerHTML = html;
    }

    // コースのフ���ーズ進行をポーリングで検出
    function startCoursePolling() {
      if (_coursePollingInterval) clearInterval(_coursePollingInterval);
      _coursePollingInterval = setInterval(function () {
        var cpUrl = BASE_API + '/customer/table-session.php?store_id=' + storeId + '&table_id=' + tableId;
        if (_sessionPin) cpUrl += '&pin=' + encodeURIComponent(_sessionPin);
        fetch(cpUrl)
          .then(function (r) {
            return r.text().then(function (body) {
              if (!body) return {};
              try { return JSON.parse(body); } catch (e) { return {}; }
            });
          })
          .then(function (json) {
            if (!json.ok || !json.data || !json.data.course) return;
            var newPhase = json.data.course.currentPhase;
            if (newPhase !== courseInfo.currentPhase) {
              courseInfo.currentPhase = newPhase;
              renderCourseView();
            }
          })
          .catch(function () {});
      }, 10000); // 10秒間隔
    }

    // ============================================================
    // N-4: 満足度評価
    // ============================================================
    var _ratingQueue = [];
    var _ratingBusy = false;

    function showSatisfactionRating(order, item) {
      _ratingQueue.push({ order: order, item: item });
      processRatingQueue();
    }

    function processRatingQueue() {
      if (_ratingBusy || _ratingQueue.length === 0) return;
      _ratingBusy = true;
      var entry = _ratingQueue.shift();
      var overlay = document.getElementById('rating-overlay');
      document.getElementById('rating-item-name').textContent = entry.item.name;
      document.querySelector('.rating-modal__sub').textContent = _t('rating_question', 'お料理はいかがですか？');
      document.getElementById('rating-skip').textContent = _t('rating_skip', 'あとで');
      overlay.classList.add('open');

      var autoClose = setTimeout(function () { closeRating(); }, 15000);

      var faces = document.querySelectorAll('.rating-face');
      function handleFaceClick(e) {
        var btn = e.currentTarget;
        var rating = parseInt(btn.getAttribute('data-rating'), 10);
        clearTimeout(autoClose);
        // 評価モーダルを非表示にする (queue 進行はここでは行わない)
        document.getElementById('rating-overlay').classList.remove('open');
        submitRating(entry, rating);
        // R1: rating <= 2 のときは理由モーダルが開くので queue 進行は
        //     理由モーダル完了後 (sendBtn / skipBtn / 自動閉じ) で行う。
        //     rating >= 3 はその場で送信完了するので即時 queue 再開する。
        if (rating > 2) {
          _ratingBusy = false;
          setTimeout(processRatingQueue, 1000);
        }
      }
      for (var i = 0; i < faces.length; i++) {
        faces[i].onclick = handleFaceClick;
      }
      document.getElementById('rating-skip').onclick = function () {
        clearTimeout(autoClose);
        closeRating();
      };
    }

    function closeRating() {
      document.getElementById('rating-overlay').classList.remove('open');
      _ratingBusy = false;
      setTimeout(processRatingQueue, 1000);
    }

    // R1: 理由モーダル完了後に評価キューを進める共通関数
    function _releaseAfterReason() {
      _ratingBusy = false;
      setTimeout(processRatingQueue, 1000);
    }

    // R1: 低評価 (1〜2) の場合に表示する理由選択肢
    var RATING_REASON_OPTIONS = [
      { code: 'slow_service', label: '提供が遅かった' },
      { code: 'taste',        label: '味が好みではなかった' },
      { code: 'temperature',  label: '温度が気になった' },
      { code: 'portion',      label: '量が気になった' },
      { code: 'wrong_item',   label: '注文内容と違った' },
      { code: 'staff',        label: '接客が気になった' },
      { code: 'cleanliness',  label: '清潔感が気になった' },
      { code: 'price',        label: '価格が気になった' },
      { code: 'other',        label: 'その他' }
    ];

    function submitRating(entry, rating) {
      OrderTracker.markRated(entry.item.item_id);

      // R1: rating <= 2 → まず理由モーダルを表示し、選択後に送信 / スキップでも rating だけ送る
      if (rating <= 2) {
        showReasonModal(entry, rating);
        return;
      }

      // rating >= 3 はそのまま送信（後方互換）
      sendRatingPayload(entry, rating, null, null);
    }

    function sendRatingPayload(entry, rating, reasonCode, reasonText) {
      var body = {
        store_id: storeId,
        table_id: tableId,
        session_token: CartManager.getSessionToken(),
        order_id: entry.order.id,
        order_item_id: entry.item.item_id,
        menu_item_id: entry.item.menu_item_id || null,
        item_name: entry.item.name,
        rating: rating
      };
      if (reasonCode) body.reason_code = reasonCode;
      if (reasonText) body.reason_text = reasonText;

      fetch(BASE_API + '/customer/satisfaction-rating.php', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(body)
      })
      .then(function (r) { return r.text(); })
      .then(function (text) {
        var json;
        try { json = JSON.parse(text); } catch (e) { return; }
        if (json && json.ok) {
          if (rating >= 4 && settings.googlePlaceId) {
            showGoogleReviewToast();
          } else {
            showRatingToast(rating >= 4 ? _t('rating_thanks_good', 'ありがとうございます！') : _t('rating_thanks_other', 'ご意見ありがとうございます'));
          }
        }
      })
      .catch(function () { /* silent — 既存の注文状況表示に影響させない */ });
    }

    // R1: 低評価理由モーダル
    function showReasonModal(entry, rating) {
      var overlay = document.getElementById('rating-reason-overlay');
      var optionsBox = document.getElementById('rating-reason-options');
      var textarea = document.getElementById('rating-reason-text');
      var sendBtn = document.getElementById('rating-reason-send');
      var skipBtn = document.getElementById('rating-reason-skip');
      if (!overlay || !optionsBox) {
        // モーダルが見つからない場合は理由なしで送信（既存動作維持）+ キュー進行
        sendRatingPayload(entry, rating, null, null);
        _releaseAfterReason();
        return;
      }

      var selected = null;

      // チップ描画 (固定文言のみ・ユーザー入力なし)
      var html = '';
      for (var i = 0; i < RATING_REASON_OPTIONS.length; i++) {
        var opt = RATING_REASON_OPTIONS[i];
        html += '<button type="button" class="rating-reason-chip" data-code="'
          + Utils.escapeHtml(opt.code) + '">'
          + Utils.escapeHtml(opt.label) + '</button>';
      }
      optionsBox.innerHTML = html;
      textarea.value = '';

      var chips = optionsBox.querySelectorAll('.rating-reason-chip');
      function handleChipClick(ev) {
        var btn = ev.currentTarget;
        var code = btn.getAttribute('data-code');
        if (selected === code) {
          selected = null;
          btn.classList.remove('is-selected');
          return;
        }
        selected = code;
        for (var j = 0; j < chips.length; j++) {
          chips[j].classList.remove('is-selected');
        }
        btn.classList.add('is-selected');
      }
      for (var k = 0; k < chips.length; k++) {
        chips[k].onclick = handleChipClick;
      }

      // 送信
      sendBtn.onclick = function () {
        var txt = (textarea.value || '').trim();
        sendRatingPayload(entry, rating, selected, txt || null);
        closeReasonModal();
        _releaseAfterReason();
      };
      // スキップ (理由なしで rating だけ送る)
      skipBtn.onclick = function () {
        sendRatingPayload(entry, rating, null, null);
        closeReasonModal();
        _releaseAfterReason();
      };

      // 30 秒で自動クローズ (お客様が無視した場合は rating だけ送る)
      var autoClose = setTimeout(function () {
        sendRatingPayload(entry, rating, null, null);
        closeReasonModal();
        _releaseAfterReason();
      }, 30000);

      overlay._autoCloseTimer = autoClose;
      overlay.classList.add('open');
    }

    function closeReasonModal() {
      var overlay = document.getElementById('rating-reason-overlay');
      if (!overlay) return;
      if (overlay._autoCloseTimer) {
        clearTimeout(overlay._autoCloseTimer);
        overlay._autoCloseTimer = null;
      }
      overlay.classList.remove('open');
    }

    function showRatingToast(msg) {
      var toast = document.createElement('div');
      toast.className = 'rating-toast';
      toast.textContent = msg;
      document.body.appendChild(toast);
      setTimeout(function () { toast.classList.add('show'); }, 10);
      setTimeout(function () {
        toast.classList.remove('show');
        setTimeout(function () { document.body.removeChild(toast); }, 300);
      }, 2000);
    }

    function showGoogleReviewToast() {
      var reviewUrl = 'https://search.google.com/local/writereview?placeid=' + encodeURIComponent(settings.googlePlaceId);
      var toast = document.createElement('div');
      toast.className = 'rating-toast rating-toast--review';
      toast.innerHTML = '<div style="margin-bottom:8px;font-weight:600;">'
        + Utils.escapeHtml(_t('rating_thanks_good', 'ありがとうございます！'))
        + '</div>'
        + '<a href="' + Utils.escapeHtml(reviewUrl) + '" target="_blank" rel="noopener" '
        + 'style="display:inline-block;padding:8px 16px;background:#4285f4;color:#fff;border-radius:20px;text-decoration:none;font-size:0.85rem;">'
        + '<span style="margin-right:4px;">&#9733;</span>'
        + Utils.escapeHtml(_t('review_google', 'Googleで評価する'))
        + '</a>';
      document.body.appendChild(toast);
      setTimeout(function () { toast.classList.add('show'); }, 10);
      setTimeout(function () {
        toast.classList.remove('show');
        setTimeout(function () {
          if (toast.parentNode) toast.parentNode.removeChild(toast);
        }, 300);
      }, 6000);
    }

    /** get-bill APIで決済可否を確認し、チェックアウトバーを表示制御 */

    /** チェックアウトモーダルを開く */
    function openCheckoutModal() {
      var modal = document.getElementById('checkout-modal');
      var body = document.getElementById('checkout-body');
      body.innerHTML = '<div style="text-align:center;padding:40px;color:#999;">読み込み中...</div>';
      modal.classList.add('open');

      modal.querySelector('.checkout-modal__header h2').textContent = _t('checkout_title', 'お会計');

      fetch(BASE_API + '/customer/get-bill.php?store_id=' + encodeURIComponent(storeId)
        + '&table_id=' + encodeURIComponent(tableId)
        + '&session_token=' + encodeURIComponent(token))
        .then(function (r) { return r.text(); })
        .then(function (text) {
          var json;
          try { json = JSON.parse(text); } catch (e) { throw new Error('応答の解析に失敗しました'); }

    /** チェックアウトモーダルの中身を描画 */
    function renderCheckoutBody(data) {
      var body = document.getElementById('checkout-body');
      var h = '';

      // 注文内訳
      var orders = data.orders || [];
      for (var oi = 0; oi < orders.length; oi++) {
        var order = orders[oi];
        h += '<div class="checkout-order">';
        var items = order.items || [];
        for (var ii = 0; ii < items.length; ii++) {
          var item = items[ii];
          var lineTotal = (item.price || 0) * (item.qty || 1);
          h += '<div class="checkout-order__item">'
            + '<span>' + Utils.escapeHtml(item.name) + ' &times; ' + (item.qty || 1) + '</span>'
            + '<span>&yen;' + lineTotal.toLocaleString() + '</span>'
            + '</div>';
          // オプション表示
          var opts = item.options || [];
          for (var ki = 0; ki < opts.length; ki++) {
            var opt = opts[ki];
            var optPrice = opt.price || 0;
            if (optPrice > 0) {
              h += '<div class="checkout-order__item checkout-order__option">'
                + '<span>+ ' + Utils.escapeHtml(opt.name || opt.choiceName || '') + '</span>'
                + '<span>&yen;' + optPrice.toLocaleString() + '</span>'
                + '</div>';
            }
          }
        }
        if (oi < orders.length - 1) h += '<hr class="checkout-order__divider">';
        h += '</div>';
      }
      h += '<hr class="checkout-order__divider">';

      // 合計セクション
      var summary = data.summary || {};
      h += '<div class="checkout-summary">';
      if (summary.subtotal_10 > 0) {
        h += '<div class="checkout-summary__row"><span>' + _t('checkout_subtotal_10', '10%対象 小計') + '</span><span>&yen;' + summary.subtotal_10.toLocaleString() + '</span></div>';
        h += '<div class="checkout-summary__row"><span>' + _t('checkout_tax_10', '(税10%)') + '</span><span>&yen;' + summary.tax_10.toLocaleString() + '</span></div>';
      }
      if (summary.subtotal_8 > 0) {
        h += '<div class="checkout-summary__row"><span>' + _t('checkout_subtotal_8', '8%対象 小計') + '</span><span>&yen;' + summary.subtotal_8.toLocaleString() + '</span></div>';
        h += '<div class="checkout-summary__row"><span>' + _t('checkout_tax_8', '(税8%)') + '</span><span>&yen;' + summary.tax_8.toLocaleString() + '</span></div>';
      }
      h += '<div class="checkout-summary__row checkout-summary__row--total"><span>' + _t('checkout_total', '合計') + '</span><span>&yen;' + (summary.total || 0).toLocaleString() + '</span></div>';

        + Utils.escapeHtml(payBtnLabel)

      h += '<div class="checkout-modal__methods-list">';
      h += '<span class="checkout-modal__method-badge checkout-modal__method-badge--visa">VISA</span>';
      h += '<span class="checkout-modal__method-badge checkout-modal__method-badge--master">Mastercard</span>';
      h += '<span class="checkout-modal__method-badge checkout-modal__method-badge--jcb">JCB</span>';
      h += '<span class="checkout-modal__method-badge checkout-modal__method-badge--amex">AMEX</span>';

      // 決済ボタンイベント
