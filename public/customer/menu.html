    /** Stripe決済開始 */
    function startPayment() {
      var btn = document.getElementById('btn-pay');
      btn.disabled = true;
      btn.textContent = _t('checkout_processing', '処理中...');

      var token = CartManager.getSessionToken();
      fetch(BASE_API + '/customer/checkout-session.php', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          store_id: storeId,
          table_id: tableId,
          session_token: token
        })
      })
      .then(function (r) { return r.text(); })
      .then(function (text) {
        var json;
        try { json = JSON.parse(text); } catch (e) { throw new Error('応答の解析に失敗しました'); }
        if (!json || !json.ok) throw new Error((json.error && json.error.message) || '決済セッション作成に失敗しました');
        // Stripeの決済ページにリダイレクト
        window.location.href = json.data.checkout_url;
      })
      .catch(function (err) {
        alert(err.message || '決済処理に失敗しました');
        btn.disabled = false;
        // data-original-text 属性に保存した元ラベル（金額付き）に戻す
        btn.textContent = btn.getAttribute('data-original-text') || _t('checkout_pay_card', 'お支払いに進む');
      });
    }

    /** Stripe決済完了後の処理 */
    function handleCheckoutSuccess(stripeSessionId) {
      var token = CartManager.getSessionToken();
      // ローディング表示
      var container = document.getElementById('menu-container');
      container.innerHTML = '<div style="text-align:center;padding:60px 20px;"><div class="loading-spinner"></div><p style="margin-top:16px;color:#666;">決済を確認中...</p></div>';

      fetch(BASE_API + '/customer/checkout-confirm.php', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          store_id: storeId,
          table_id: tableId,
          session_token: token,
          stripe_session_id: stripeSessionId
        })
      })
      .then(function (r) { return r.text(); })
      .then(function (text) {
        var json;
        try { json = JSON.parse(text); } catch (e) { throw new Error('応答の解析に失敗しました'); }
        if (!json || !json.ok) {
          var code = json && json.error ? json.error.code : '';
          if (code === 'PAYMENT_NOT_CONFIRMED') {
            throw new Error(_t('checkout_not_confirmed', '決済が確認できませんでした。しばらくしてから再度お試しください'));
          }
          throw new Error((json.error && json.error.message) || 'エラーが発生しました。スタッフにお声がけください');
        }

        var d = json.data;
        _checkoutPaymentId = d.payment_id;

        // カート・バー非表示
        CartManager.clearCart();
        document.getElementById('cart-bar').style.display = 'none';
        document.getElementById('checkout-bar').style.display = 'none';

        // URLからcheckoutパラメータを除去
        var cleanUrl = window.location.pathname + '?store_id=' + encodeURIComponent(storeId) + '&table_id=' + encodeURIComponent(tableId);
        window.history.replaceState(null, '', cleanUrl);

        // 決済完了モーダル表示
        showCheckoutDone(d.total || 0);
      })
      .catch(function (err) {
        container.innerHTML = '<div style="text-align:center;padding:60px 20px;">'
          + '<div style="font-size:2rem;margin-bottom:16px;">&#x26A0;</div>'
          + '<p style="color:#d32f2f;font-size:1rem;">' + Utils.escapeHtml(err.message) + '</p>'
          + '<p style="color:#999;font-size:0.85rem;margin-top:12px;">お困りの場合はスタッフにお声がけください</p>'
          + '</div>';
      });
    }

    /** 決済完了モーダル表示 */
    function showCheckoutDone(total) {
      // 背景の「決済を確認中...」を消す
      document.getElementById('menu-container').innerHTML = '';
      var modal = document.getElementById('checkout-done-modal');
      modal.querySelector('h2').textContent = _t('checkout_done_title', 'お支払い完了');
      modal.querySelector('.checkout-done-modal__content > p').textContent = _t('checkout_done_thanks', 'ありがとうございました');
      document.getElementById('checkout-done-amount').textContent = '\u00a5' + total.toLocaleString();
      document.getElementById('btn-view-receipt').textContent = _t('checkout_view_receipt', '領収書を表示');
      modal.querySelector('.checkout-done-modal__note').textContent = _t('checkout_receipt_note', '紙の領収書が必要な場合はスタッフにお申し付けください');
      document.getElementById('btn-checkout-done-close').textContent = _t('btn_close', '閉じる');
      modal.classList.add('open');
    }

    /** 領収書表示 */
    function viewReceipt() {
      if (!_checkoutPaymentId) return;
      fetch(BASE_API + '/customer/receipt-view.php?payment_id=' + encodeURIComponent(_checkoutPaymentId)
        + '&store_id=' + encodeURIComponent(storeId))
        .then(function (r) { return r.text(); })
        .then(function (text) {
          var json;
          try { json = JSON.parse(text); } catch (e) { throw new Error('データ取得に失敗しました'); }
          if (!json || !json.ok) throw new Error((json.error && json.error.message) || 'データ取得に失敗しました');
          printReceiptHtml(json.data);
        })
        .catch(function (err) {
          alert(err.message);
        });
    }

    /** 領収書HTMLを新しいウィンドウで表示 */
    function printReceiptHtml(data) {
      var store = data.store || {};
      var payment = data.payment || {};
      var items = data.items || [];
      var summary = data.summary || {};

      var esc = function (s) { return Utils.escapeHtml(s || ''); };

      var h = '<!DOCTYPE html><html><head><meta charset="UTF-8">'
        + '<meta http-equiv="Content-Type" content="text/html; charset=UTF-8">'
        + '<meta name="viewport" content="width=device-width,initial-scale=1">'
        + '<title>お会計明細</title>'
        + '<style>'
        + 'body{font-family:sans-serif;max-width:320px;margin:0 auto;padding:16px;font-size:13px;color:#333;}'
        + '.rc-header{text-align:center;margin-bottom:12px;}'
        + '.rc-store{font-size:1.1rem;font-weight:bold;}'
        + '.rc-addr{font-size:0.8rem;color:#666;margin-top:4px;}'
        + '.rc-title{font-size:1rem;font-weight:bold;text-align:center;margin:12px 0;border-top:1px dashed #999;border-bottom:1px dashed #999;padding:6px 0;}'
        + '.rc-item{display:flex;justify-content:space-between;padding:2px 0;}'
        + '.rc-divider{border:none;border-top:1px dashed #999;margin:8px 0;}'
        + '.rc-total{display:flex;justify-content:space-between;font-size:1.2rem;font-weight:bold;padding:8px 0;border-top:2px solid #333;margin-top:4px;}'
        + '.rc-tax{font-size:0.8rem;color:#666;}'
        + '.rc-footer{text-align:center;margin-top:16px;font-size:0.75rem;color:#999;}'
        + '.rc-reg{font-size:0.8rem;margin-top:8px;}'
        + '@media print{body{max-width:72mm;padding:0;margin:0;font-size:11px;}}'
        + '</style></head><body>';

      // ヘッダー
      h += '<div class="rc-header">';
      h += '<div class="rc-store">' + esc(store.receipt_store_name) + '</div>';
      if (store.receipt_address) h += '<div class="rc-addr">' + esc(store.receipt_address) + '</div>';
      if (store.receipt_phone) h += '<div class="rc-addr">TEL: ' + esc(store.receipt_phone) + '</div>';
      if (store.registration_number) {
        h += '<div class="rc-reg">登録番号: ' + esc(store.registration_number) + '</div>';
        if (store.business_name) h += '<div class="rc-addr">' + esc(store.business_name) + '</div>';
      }
      h += '</div>';

      // タイトル
      var titleText = store.registration_number ? '適格簡易請求書' : 'お会計明細';
      h += '<div class="rc-title">' + esc(titleText) + '</div>';

      // 品目一覧
      for (var i = 0; i < items.length; i++) {
        var item = items[i];
        var lineTotal = (item.price || 0) * (item.qty || 1);
        var taxMark = item.taxRate === 8 ? ' ※' : '';
        h += '<div class="rc-item"><span>' + esc(item.name) + ' x' + (item.qty || 1) + taxMark + '</span><span>&yen;' + lineTotal.toLocaleString() + '</span></div>';
      }

      h += '<hr class="rc-divider">';

      // 税率別内訳
      if (summary.subtotal_10 > 0) {
        h += '<div class="rc-item rc-tax"><span>10%対象</span><span>&yen;' + summary.subtotal_10.toLocaleString() + '</span></div>';
        h += '<div class="rc-item rc-tax"><span> 消費税(10%)</span><span>&yen;' + summary.tax_10.toLocaleString() + '</span></div>';
      }
      if (summary.subtotal_8 > 0) {
        h += '<div class="rc-item rc-tax"><span>8%対象 ※</span><span>&yen;' + summary.subtotal_8.toLocaleString() + '</span></div>';
        h += '<div class="rc-item rc-tax"><span> 消費税(8%)</span><span>&yen;' + summary.tax_8.toLocaleString() + '</span></div>';
      }

      // 合計
      h += '<div class="rc-total"><span>' + esc(_t('checkout_total', '合計')) + '</span><span>&yen;' + (summary.total || 0).toLocaleString() + '</span></div>';

      // 支払い方法・日時
      h += '<hr class="rc-divider">';
      h += '<div class="rc-item"><span>お支払い</span><span>カード</span></div>';
      if (payment.paid_at) h += '<div class="rc-item"><span>日時</span><span>' + esc(payment.paid_at) + '</span></div>';

      // フッター
      h += '<div class="rc-footer">';
      if (store.receipt_footer) h += '<p>' + esc(store.receipt_footer) + '</p>';
      h += '<p style="margin-top:8px;">この画面をスクリーンショットで保存してください</p>';
      if (summary.subtotal_8 > 0) h += '<p>※ は軽減税率(8%)対象品目です</p>';
      h += '</div>';

      h += '</body></html>';

      // P1-19b: Blob URL 方式に変更（document.write 方式で iOS Safari 等が UTF-8 を誤認して文字化けする問題対策）
      var blob = new Blob([h], { type: 'text/html;charset=UTF-8' });
      var blobUrl = URL.createObjectURL(blob);
      var w = window.open(blobUrl, '_blank', 'width=320,height=600');
      if (w) {
        w.focus();
        // メモリリーク予防のため5秒後に Blob URL を解放（ブラウザによる読み込み完了を待つ）
        setTimeout(function () { URL.revokeObjectURL(blobUrl); }, 5000);
      } else {
        URL.revokeObjectURL(blobUrl);
        alert('ポップアップがブロックされました。ブラウザの設定をご確認ください。');
      }
    }

    /** キャンセルトースト表示 */
    function showCheckoutCancelToast() {
      var msg = _t('checkout_cancel_msg', 'お支払いがキャンセルされました');
      var toast = document.createElement('div');
      toast.className = 'rating-toast';
      toast.textContent = msg;
      document.body.appendChild(toast);
      setTimeout(function () { toast.classList.add('show'); }, 10);
      setTimeout(function () {
        toast.classList.remove('show');
        setTimeout(function () { if (toast.parentNode) toast.parentNode.removeChild(toast); }, 300);
      }, 3000);
    }

    // L-8: イベントリスナー
    document.getElementById('btn-checkout').addEventListener('click', function () {
      openCheckoutModal();
    });
    document.getElementById('checkout-close').addEventListener('click', function () {
      document.getElementById('checkout-modal').classList.remove('open');
    });
    document.querySelector('#checkout-modal .checkout-modal__overlay').addEventListener('click', function () {
      document.getElementById('checkout-modal').classList.remove('open');
    });
    document.getElementById('btn-view-receipt').addEventListener('click', function () {
      viewReceipt();
    });
    document.getElementById('btn-checkout-done-close').addEventListener('click', function () {
      document.getElementById('checkout-done-modal').classList.remove('open');
      _checkoutPaymentId = null; // ガード解除
      showSessionEnded();
    });

    function showSessionEnded() {
      // 全ポーリング停止
      if (_tokenCheckInterval) { clearInterval(_tokenCheckInterval); _tokenCheckInterval = null; }
      if (_versionTimer) { clearInterval(_versionTimer); _versionTimer = null; }
      if (_planTimerInterval) { clearInterval(_planTimerInterval); _planTimerInterval = null; }
      if (_coursePollingInterval) { clearInterval(_coursePollingInterval); _coursePollingInterval = null; }
      OrderTracker.stop();

      // L-8: 決済完了モーダル表示中なら session-ended は出さない
      if (_checkoutPaymentId) return;

      // 言語対応
      var titleEl = document.getElementById('session-ended-title');
      var msgEl = document.getElementById('session-ended-msg');
      titleEl.textContent = _t('session_ended_title', 'ご利用ありがとうございました');
      msgEl.textContent = _t('session_ended_msg', 'お会計が完了しました。またのご来店をお待ちしております。');

      // オーバーレイ表示
      var overlay = document.getElementById('session-ended-overlay');
      overlay.style.display = 'flex';

      // カートバー非表示
      document.getElementById('cart-bar').style.display = 'none';
      // L-8: チェックアウトバーも非表示
      document.getElementById('checkout-bar').style.display = 'none';
    }
  })();
  </script>
