# ============================================================
# POSLA — Apache vhost (ローカル開発専用)
# ============================================================
# /public を URL のプレフィックスから外すため、DocumentRoot を
# /var/www/html/public に設定。/api は Alias で /var/www/html/api
# を直接参照する。
# 例:
#   http://127.0.0.1:8081/posla-admin/dashboard.html
#   http://127.0.0.1:8081/admin/
#   http://127.0.0.1:8081/docs-tenant/
#   http://127.0.0.1:8081/api/monitor/ping.php
# ============================================================

<VirtualHost *:80>
    ServerName localhost
    DocumentRoot /var/www/html/public

    <Directory /var/www/html/public>
        Options Indexes FollowSymLinks
        AllowOverride All
        Require all granted
        DirectoryIndex index.html index.php
    </Directory>

    # /api → /var/www/html/api (DocumentRoot の外)
    Alias /api /var/www/html/api
    <Directory /var/www/html/api>
        AllowOverride All
        Require all granted
    </Directory>

    # /privacy, /terms も DocumentRoot の外にマウントされているため Alias で公開
    Alias /privacy /var/www/html/privacy
    <Directory /var/www/html/privacy>
        AllowOverride All
        Require all granted
    </Directory>

    Alias /terms /var/www/html/terms
    <Directory /var/www/html/terms>
        AllowOverride All
        Require all granted
    </Directory>

    # customer ディレクトリのルート直アクセスは一覧ではなく 404 に統一
    RedirectMatch 404 ^/customer/?$

    ErrorLog ${APACHE_LOG_DIR}/posla_error.log
    CustomLog ${APACHE_LOG_DIR}/posla_access.log combined
</VirtualHost>
