# ============================================================
# POSLA — Apache vhost (ローカル開発専用)
# ============================================================
# 本番 Sakura では DocumentRoot = /home/odah/www/eat-posla/ で
# /api と /public がそのまま並ぶ構成。ローカルもこれに合わせる。
# /var/www/html/api と /var/www/html/public がマウントされている前提。
# ============================================================

<VirtualHost *:80>
    ServerName localhost
    DocumentRoot /var/www/html

    <Directory /var/www/html>
        Options Indexes FollowSymLinks
        AllowOverride All
        Require all granted
        DirectoryIndex index.html index.php
    </Directory>

    # api/ 配下では .htaccess の SetEnv が効くよう AllowOverride All
    <Directory /var/www/html/api>
        AllowOverride All
        Require all granted
    </Directory>

    # public/ 配下も同様
    <Directory /var/www/html/public>
        AllowOverride All
        Require all granted
    </Directory>

    # ルート / にアクセスされたら public/index.html へ案内
    RedirectMatch 302 ^/$ /public/index.html

    ErrorLog ${APACHE_LOG_DIR}/posla_error.log
    CustomLog ${APACHE_LOG_DIR}/posla_access.log combined
</VirtualHost>
